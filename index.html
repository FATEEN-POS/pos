<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فطين - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px;
            backdrop-filter: blur(15px); text-align: center;
        }
        h2 { margin-bottom: 30px; font-weight: 700; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; }
        input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; outline: none;
        }
        .login-btn {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
        .login-btn:disabled { background: #555; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>دخول نظام فطين</h2>
        <div class="input-group">
            <label>كود المتجر (Store Key)</label>
            <input type="text" id="storeKey" placeholder="مثلاً: ASW01">
        </div>
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="admin">
        </div>
        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="•••">
        </div>
        <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
    </div>

    <script>
        // البيانات المستخرجة بدقة من صورك المرفقة
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';

        // إنشاء العميل
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const sKey = document.getElementById('storeKey').value.trim();
            const uName = document.getElementById('username').value.trim();
            const pWord = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!sKey || !uName || !pWord) { alert("أكمل البيانات!"); return; }

            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            try {
                // البحث في جدول الموظفين
                const { data, error } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('store_key', sKey)
                    .eq('username', uName)
                    .eq('password', pWord);

                if (error) throw error;

                if (data && data.length > 0) {
                    alert("✅ تم الدخول بنجاح! متجر: " + sKey);
                    // هنا نفتح الداشبورد
                } else {
                    alert("❌ بيانات الدخول غلط للمتجر ده!");
                }
            } catch (err) {
                console.error(err);
                alert("حدث خطأ في الاتصال: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "تسجيل الدخول";
            }
        });
    </script>
</body>
</html>
