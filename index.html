<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fateen POS - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ======= THEMES ======= */
        :root {
            --bg: #050505;
            --card: #111111;
            --card2: #1a1a1a;
            --accent: #00f2fe;
            --border: #2a2a2a;
            --text: #ffffff;
            --text-muted: #666;
            --input-bg: #000000;
            --btn-color: #000;
        }

        [data-theme="light"] {
            --bg: #f0ede5;
            --card: #ffffff;
            --card2: #e8e4db;
            --accent: #004643;
            --border: #c8c4bb;
            --text: #1a1a1a;
            --text-muted: #888;
            --input-bg: #e8e4db;
            --btn-color: #f0ede5;
        }

        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s, border-color 0.3s; }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* BG pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(0,242,254,0.04) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(0,242,254,0.03) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        [data-theme="light"] body::before {
            background-image: radial-gradient(circle at 20% 50%, rgba(0,70,67,0.06) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(0,70,67,0.04) 0%, transparent 40%);
        }

        /* ======= SPLASH ======= */
        #splash {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .splash-logo {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: 10px;
            color: var(--accent);
            animation: pulse 1.8s infinite;
        }

        .splash-version {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 12px;
            letter-spacing: 3px;
        }

        .splash-bar-bg {
            width: 180px;
            height: 3px;
            background: var(--border);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
        }

        .splash-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            animation: loadbar 2s ease forwards;
        }

        @keyframes loadbar { from { width: 0% } to { width: 100% } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ======= THEME TOGGLE ======= */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .theme-toggle:hover { border-color: var(--accent); }

        /* ======= LOGIN WRAPPER ======= */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 420px;
            animation: fadeUp 0.5s ease;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 6px;
            color: var(--accent);
        }

        .brand-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ======= CARD ======= */
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 30px;
        }

        .step-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .store-label {
            display: block;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--accent);
            font-weight: 800;
            font-size: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 7px;
            font-weight: 700;
        }

        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            padding: 13px 16px;
            font-size: 14px;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,242,254,0.08);
        }

        [data-theme="light"] .input-group input:focus {
            box-shadow: 0 0 0 3px rgba(0,70,67,0.08);
        }

        .btn-main {
            width: 100%;
            background: var(--accent);
            color: var(--btn-color);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 8px;
        }

        .btn-main:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-main:active { transform: translateY(0); }

        .btn-back {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 12px;
            padding: 11px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            margin-top: 10px;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

        .error-msg {
            background: rgba(255,77,77,0.1);
            border: 1px solid rgba(255,77,77,0.3);
            color: #ff4d4d;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        [data-theme="light"] .error-msg {
            background: rgba(192,57,43,0.08);
            border-color: rgba(192,57,43,0.3);
            color: #c0392b;
        }

        .footer-text {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 22px;
        }

        /* ======= STEP TRANSITIONS ======= */
        .step { display: none; }
        .step.active { display: block; animation: fadeUp 0.3s ease; }

        /* ======= LOADING SPINNER ======= */
        .loading { display: none; text-align: center; padding: 20px 0; color: var(--accent); font-size: 13px; }
        .loading.show { display: block; }
        .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fateen OS">
    <meta name="theme-color" content="#00f2fe">

    <!-- ===== FATEEN AUTH ===== -->
    <script>
    (function(){
        const TIMEOUT_MS = 8 * 60 * 60 * 1000;
        const PAGE = window.location.pathname.split('/').pop() || 'index.html';
        const PUBLIC = ['index.html','guide.html','about.html',''];
        function saveSession(data) { localStorage.setItem('fateen_session', JSON.stringify({...data, timestamp:Date.now()})); }
        function getSession() {
            try { const s=JSON.parse(localStorage.getItem('fateen_session')||'null');
            if(!s) return null;
            if(Date.now()-s.timestamp>TIMEOUT_MS){localStorage.removeItem('fateen_session');return null;}
            return s; } catch(e){return null;}
        }
        function clearSession() { localStorage.removeItem('fateen_session'); sessionStorage.clear(); }
        ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{const s=getSession();if(s)saveSession(s);},{passive:true}));
        if(!PUBLIC.includes(PAGE)){
            const s=getSession();
            if(!s||!s.store_key){window.location.replace('index.html');return;}
            sessionStorage.setItem('store_key',s.store_key);
            sessionStorage.setItem('username',s.username);
            sessionStorage.setItem('userRole',s.userRole);
        }
        window._fateenAuth={saveSession,getSession,clearSession};
    })();
    </script>
</head>
<body>

    <!-- SPLASH -->
    <div id="splash">
        <img src="لوجو_فطين_ابيض.png" id="splash-logo-img" style="height:80px;object-fit:contain;margin-bottom:12px;" onerror="this.style.display='none';document.getElementById('splash-logo-txt').style.display='block'">
        <div class="splash-logo" id="splash-logo-txt" style="display:none;">FATEEN</div>
        <div class="splash-version" id="splash-version">Loading...</div>
        <div class="splash-bar-bg"><div class="splash-bar-fill"></div></div>
    </div>

    <!-- THEME TOGGLE -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <span id="theme-icon">🌙</span>
        <span id="theme-label">ثيم فاتح</span>
    </button>

    <!-- LOGIN -->
    <div class="login-wrapper" id="loginUI" style="display:none;">
        <div class="brand-header">
            <img src="لوجو_فطين_ابيض.png" id="brand-logo-img" style="height:60px;object-fit:contain;margin-bottom:8px;" onerror="this.style.display='none';document.getElementById('brand-logo-txt').style.display='block'">
            <div class="brand-logo" id="brand-logo-txt" style="display:none;">FATEEN</div>
            <div class="brand-sub">نظام إدارة المبيعات الذكي</div>
        </div>

        <div class="login-card">

            <!-- STEP 1: كود المتجر -->
            <div class="step active" id="step1">
                <div class="step-title"> دخول النظام</div>

                <div class="input-group">
                    <label>كود المتجر</label>
                    <input type="text" id="storeKeyInput" placeholder="أدخل كود المتجر..." onkeypress="if(event.key==='Enter') checkStore()">
                </div>

                <div class="loading" id="loading1">
                    <div class="spinner"></div>
                    جاري التحقق...
                </div>

                <button class="btn-main" onclick="checkStore()">التحقق من المتجر ←</button>
                <div class="error-msg" id="err1">كود المتجر غير صحيح</div>
            </div>

            <!-- STEP 2: بيانات الدخول -->
            <div class="step" id="step2">
                <div class="step-title">👤 بيانات الدخول</div>

                <div class="store-label" id="storeNameDisplay">اسم المتجر</div>

                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="usernameInput" placeholder="اسم المستخدم" onkeypress="if(event.key==='Enter') document.getElementById('passwordInput').focus()">
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="passwordInput" placeholder="••••••••" onkeypress="if(event.key==='Enter') doLogin()">
                </div>

                <div class="loading" id="loading2">
                    <div class="spinner"></div>
                    جاري الدخول...
                </div>

                <!-- Captcha بسيط -->
                <div style="background:rgba(0,242,254,0.05);border:1px solid var(--accent-dim);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <span style="font-size:13px;font-weight:700;color:var(--accent);">تحقق:</span>
                    <span style="font-size:14px;font-weight:800;" id="captcha-q">—</span>
                    <input type="number" id="captcha-ans" placeholder="الإجابة" style="width:75px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;" onkeypress="if(event.key==='Enter')doLogin()">
                </div>
                <button class="btn-main" onclick="doLogin()">دخول ←</button>
                <button class="btn-back" onclick="goBack()">← تغيير كود المتجر</button>
                <div class="error-msg" id="err2">اسم المستخدم أو كلمة المرور غير صحيحة</div>
            </div>

        </div>

        <div style="text-align:center;margin-bottom:8px;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;">
            <a href="guide.html" style="color:var(--accent);font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--accent);padding:7px 16px;border-radius:20px;">
                📖 الدليل
            </a>
            <a href="about.html" style="color:var(--text);font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);padding:7px 16px;border-radius:20px;">
                📞 تواصل معنا
            </a>
            <a href="https://wa.me/201273929303" target="_blank" style="color:#25d366;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:5px;">
                💬 واتساب
            </a>
        </div>
        <div class="footer-text">جميع الحقوق محفوظة &copy; 2026 Fateen POS</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentStore = null;

        // ======= THEME =======
        function toggleTheme() {
            const html = document.documentElement;
            const isLight = html.getAttribute('data-theme') === 'light';
            html.setAttribute('data-theme', isLight ? '' : 'light');
            localStorage.setItem('fateen_theme', isLight ? 'dark' : 'light');
            updateThemeBtn(!isLight);
        }

        function updateThemeBtn(isLight) {
            document.getElementById('theme-icon').innerText = isLight ? '☀️' : '🌙';
            document.getElementById('theme-label').innerText = isLight ? 'ثيم داكن' : 'ثيم فاتح';
            const imgs = ['splash-logo-img','brand-logo-img'];
            imgs.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.src = isLight ? 'لوجو_فطين_اسود.png' : 'لوجو_فطين_ابيض.png';
            });
        }

        function loadTheme() {
            const saved = localStorage.getItem('fateen_theme');
            if (saved === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                updateThemeBtn(true);
            }
        }

        // ======= SPLASH =======
        async function loadSplash() {
            const { data } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if (data) document.getElementById('splash-version').innerText = data.value;
            // لو عنده session صالحة
            if(window._fateenAuth){
                const s=window._fateenAuth.getSession();
                if(s&&s.store_key){
                    if(s.userRole==='developer'){location.replace('developer.html');return;}
                    else if(s.userRole==='marketer'){location.replace('marketer.html');return;}
                    else if(s.userRole==='manager'){location.replace('manager.html');return;}
                    else{location.replace('pos.html');return;}
                }
            }
        }

        function hideSplash() {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                const ui = document.getElementById('loginUI');
                ui.style.display = 'block';
            }, 600);
        }

        // ======= STEP 1 =======
        async function checkStore() {
            const key = document.getElementById('storeKeyInput').value.trim();
            if (!key) return;

            document.getElementById('err1').style.display = 'none';
            document.getElementById('loading1').classList.add('show');

            const { data: store } = await _supabase.from('stores').select('*').eq('store_key', key).single();

            document.getElementById('loading1').classList.remove('show');

            if (!store) {
                document.getElementById('err1').style.display = 'block';
                return;
            }

            if (!store.is_active) {
                document.getElementById('err1').innerText = 'هذا المتجر غير مفعل، تواصل مع الدعم';
                document.getElementById('err1').style.display = 'block';
                return;
            }

            currentStore = store;
            document.getElementById('storeNameDisplay').innerText = '🏪 ' + store.store_name;
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            setTimeout(() => document.getElementById('usernameInput').focus(), 100);
        }

        // ======= STEP 2 =======
        let _captchaA=0,_captchaB=0;
        function genCaptcha(){
            _captchaA=Math.floor(Math.random()*10)+1;
            _captchaB=Math.floor(Math.random()*10)+1;
            const el=document.getElementById('captcha-q');
            if(el) el.innerText=_captchaA+' + '+_captchaB+' = ?';
            const inp=document.getElementById('captcha-ans');
            if(inp) inp.value='';
        }

        async function doLogin() {
            // تحقق من الـ captcha
            const captchaAns = parseInt(document.getElementById('captcha-ans')?.value||0);
            if(captchaAns !== _captchaA+_captchaB){
                document.getElementById('err2').style.display='block';
                document.getElementById('err2').innerText='❌ إجابة التحقق غير صحيحة';
                genCaptcha();
                return;
            }
            const u = document.getElementById('usernameInput').value.trim();
            const p = document.getElementById('passwordInput').value;
            if (!u || !p) return;

            document.getElementById('err2').style.display = 'none';
            document.getElementById('loading2').classList.add('show');

            const { data } = await _supabase.from('users').select('*')
                .eq('username', u).eq('password', p).eq('store_key', currentStore.store_key);

            document.getElementById('loading2').classList.remove('show');

            if (!data || data.length === 0) {
                document.getElementById('err2').style.display = 'block';
                return;
            }

            const user = data[0];
            sessionStorage.setItem('username', user.username);
            sessionStorage.setItem('userRole', user.role);
            sessionStorage.setItem('store_key', currentStore.store_key);

            if(window._fateenAuth){window._fateenAuth.saveSession({store_key:currentStore.store_key,username:user.username,userRole:user.role});}
            if (user.role === 'developer') location.href = 'developer.html';
            else if (user.role === 'marketer') location.href = 'marketer.html';
            else if (user.role === 'manager') location.href = 'manager.html';
            else location.href = 'pos.html';
        }

        function goBack() {
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('err2').style.display = 'none';
            document.getElementById('usernameInput').value = '';
            document.getElementById('passwordInput').value = '';
        }

        // ======= INIT =======
        loadTheme();
        loadSplash();
        setTimeout(hideSplash, 2200);

        // ===== PWA Service Worker =====
        if('serviceWorker' in navigator){
            navigator.serviceWorker.register('/sw.js').then(reg=>{
                console.log('Fateen OS SW registered:', reg.scope);
            }).catch(e=>{
                console.log('SW registration failed:', e);
            });
        }
    </script>
</body>
</html>
