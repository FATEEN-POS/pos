<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المطور - نظام فطين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #0b0b0b; color: #fff; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { color: #fff; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #888; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: #fff; outline: none; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ccc; }
        .status-msg { margin-top: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>لوحة تحكم المطور 🛠️</h1>
        <button onclick="location.href='index.html'" style="width: auto; padding: 8px 20px; background: #ff4444; color: #fff;">تسجيل خروج</button>
    </div>

    <div class="grid">
        <div class="card">
            <h2>اضافة محل جديد</h2>
            <div class="form-group">
                <label>كود المحل (Store Key)</label>
                <input type="text" id="newStoreKey" placeholder="مثل: ASW02">
            </div>
            <div class="form-group">
                <label>اسم المحل</label>
                <input type="text" id="newStoreName" placeholder="مثل: فرع القاهرة">
            </div>
            <button onclick="addNewStore()">حفظ المحل الجديد</button>
            <div id="storeMsg" class="status-msg"></div>
        </div>

        <div class="card">
            <h2>اضافة مستخدم جديد</h2>
            <div class="form-group">
                <label>اختر المحل</label>
                <select id="userStoreKey">
                    <option value="">-- اختر المحل --</option>
                    </select>
            </div>
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="newUsername" placeholder="اسم المستخدم للولوج">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="newUserPass" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>الصلاحية (Role)</label>
                <select id="newUserRole">
                    <option value="employee">موظف (Employee)</option>
                    <option value="manager">مدير (Manager)</option>
                    <option value="developer">مطور (Developer)</option>
                </select>
            </div>
            <button onclick="addNewUser()">حفظ المستخدم</button>
            <div id="userMsg" class="status-msg"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 1. وظيفة إضافة محل
    async function addNewStore() {
        const key = document.getElementById('newStoreKey').value.trim();
        const name = document.getElementById('newStoreName').value.trim();
        if(!key || !name) return alert("اكمل بيانات المحل");

        const { error } = await _supabase.from('stores').insert([{ store_key: key, store_name: name }]);
        
        if(error) {
            document.getElementById('storeMsg').innerHTML = "❌ خطأ: " + error.message;
        } else {
            document.getElementById('storeMsg').innerHTML = "✅ تم اضافة المحل بنجاح!";
            loadStores(); // تحديث القائمة
        }
    }

    // 2. وظيفة إضافة مستخدم
    async function addNewUser() {
        const sKey = document.getElementById('userStoreKey').value;
        const uName = document.getElementById('newUsername').value.trim();
        const uPass = document.getElementById('newUserPass').value;
        const uRole = document.getElementById('newUserRole').value;

        if(!sKey || !uName || !uPass) return alert("اكمل بيانات المستخدم");

        const { error } = await _supabase.from('users').insert([
            { username: uName, password: uPass, store_key: sKey, role: uRole }
        ]);

        if(error) {
            document.getElementById('userMsg').innerHTML = "❌ خطأ: " + error.message;
        } else {
            document.getElementById('userMsg').innerHTML = "✅ تم اضافة المستخدم بنجاح!";
        }
    }

    // 3. تحميل المحلات في القائمة المنسدلة
    async function loadStores() {
        const { data, error } = await _supabase.from('stores').select('store_key, store_name');
        if(data) {
            const select = document.getElementById('userStoreKey');
            select.innerHTML = '<option value="">-- اختر المحل --</option>';
            data.forEach(store => {
                select.innerHTML += `<option value="${store.store_key}">${store.store_name} (${store.store_key})</option>`;
            });
        }
    }

    // تشغيل عند الفتح
    loadStores();
</script>

</body>
</html>
