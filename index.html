<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فطين - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px;
            backdrop-filter: blur(15px); text-align: center;
        }
        h2 { margin-bottom: 30px; font-weight: 700; }
        input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; outline: none; margin-bottom: 20px; text-align: right;
        }
        .login-btn {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>دخول نظام فطين</h2>
        <input type="text" id="storeKey" placeholder="كود المتجر (مثل: ASW01)">
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button class="login-btn" id="loginBtn">دخول</button>
    </div>

    <script>
        // بيانات الربط الخاصة بقاعدة بياناتك
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginBtn').onclick = async function() {
            const sKey = document.getElementById('storeKey').value.trim();
            const uName = document.getElementById('username').value.trim();
            const pWord = document.getElementById('password').value.trim();

            // 1. مسح أي بيانات دخول قديمة
            sessionStorage.clear();

            // 2. طلب التأكد من البيانات من السيرفر
            const { data, error } = await _supabase
                .from('users')
                .select('*')
                .eq('store_key', sKey)
                .eq('username', uName)
                .eq('password', pWord);

            if (data && data.length > 0) {
                const user = data[0];
                
                // 3. حفظ "الجلسة" عشان الصفحة التانية تعرف إننا سجلنا دخول
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', user.role);

                // 4. التوجيه الدقيق جداً حسب الـ Role
                const myRole = String(user.role).trim().toLowerCase();

                if (myRole === 'developer') {
                    window.location.href = "developer.html";
                } else if (myRole === 'manager') {
                    window.location.href = "manager.html";
                } else {
                    window.location.href = "pos.html";
                }
            } else {
                alert("بيانات الدخول غلط يا بطل!");
            }
        };
    </script>
</body>
</html>
