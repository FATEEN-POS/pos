<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen POS - Loading</title>
    <style>
        /* ستايل شاشة الترحيب */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #000 url('باك جراوند لوجو اسود.jpg') no-repeat center center;
            background-size: cover; /* لضمان تغطية الصورة للشاشة بالكامل */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        /* ستايل محتوى السيستم (مخفي في البداية) */
        #main-system {
            display: none;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        /* زر التخطي */
        #skip-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid white;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <button id="skip-btn" onclick="showSystem()">تخطي الانتظار (Skip)</button>
    </div>

    <div id="main-system">
        <h1>مرحباً بك في نظام FATEEN POS</h1>
        <p>جاري تشغيل لوحة التحكم الخاصة بمحلك في أسوان...</p>
    </div>

    <script>
        function showSystem() {
            const splash = document.getElementById('splash-screen');
            const system = document.getElementById('main-system');
            
            splash.style.opacity = '0'; // تأثير الاختفاء التدريجي
            setTimeout(() => {
                splash.style.display = 'none';
                system.style.display = 'block';
            }, 1000); // إخفاء بعد ثانية من بداية الـ Fade
        }

        // ضبط المؤقت لـ 10 ثوانٍ (10000 مللي ثانية)
        setTimeout(showSystem, 10000);
    </script>
</body>
</html>
