<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen POS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .login-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 400px; backdrop-filter: blur(15px); text-align: center;
        }

        h2 { margin-bottom: 25px; font-weight: 700; color: #fff; }

        .input-group { margin-bottom: 15px; text-align: right; }
        label { display: block; color: #aaa; margin-bottom: 5px; font-size: 13px; }
        
        input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px;
            color: #fff; outline: none; transition: 0.3s;
        }

        input:focus { border-color: #fff; background: rgba(255, 255, 255, 0.15); }

        /* تمييز خانة كود التفعيل بلون مختلف بسيط */
        .store-key-input { border: 1px solid rgba(255, 255, 255, 0.3); font-weight: bold; letter-spacing: 2px; text-align: center; }

        .login-btn {
            width: 100%; padding: 14px; background: #fff; color: #000;
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 15px;
        }

        .login-btn:hover { background: #ddd; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>دخول نظام فطين</h2>
        
        <div class="input-group">
            <label>كود المتجر (Store Key)</label>
            <input type="text" id="storeKey" class="store-key-input" placeholder="مثلاً: ASW-101">
        </div>

        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اسمك">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="login-btn" onclick="handleLogin()">تسجيل الدخول</button>
    </div>

    <script>
        function handleLogin() {
            const key = document.getElementById('storeKey').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if(!key || !user || !pass) {
                alert("برجاء ملء جميع البيانات!");
                return;
            }

            // ده المنطق اللي هنربطه بـ Supabase لاحقاً
            console.log("جاري محاولة الدخول للمتجر:", key);
            alert("بياناتك اتبعتت لـ فطين.. بنشيك على المتجر: " + key);
        }
    </script>
</body>
</html>
