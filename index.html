<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen POS - Login System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #0b0b0b; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px;
            backdrop-filter: blur(15px); text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h2 { margin-bottom: 30px; font-weight: 700; color: #fff; }
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; color: #aaa; margin-bottom: 8px; font-size: 14px; }
        
        input {
            width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; outline: none; transition: 0.3s; font-size: 16px;
        }

        input:focus { border-color: #fff; background: rgba(255, 255, 255, 0.15); }

        .login-btn {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 700; font-size: 18px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .login-btn:hover { background: #ddd; transform: translateY(-2px); }
        .login-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>دخول نظام فطين</h2>
        
        <div class="input-group">
            <label>كود المتجر (Store Key)</label>
            <input type="text" id="storeKey" placeholder="مثلاً: ASW01">
        </div>

        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="اسم المستخدم">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
    </div>

    <script>
        // البيانات المستخرجة من حسابك
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_nqIk7-m-V1uCV97HK0dQIA_ohU3B6D_R67-V91H63Uf65r3q';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const sKey = document.getElementById('storeKey').value;
            const uName = document.getElementById('username').value;
            const pWord = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!sKey || !uName || !pWord) {
                alert("برجاء ملء جميع البيانات");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            try {
                // 1. التحقق من وجود المتجر
                const { data: store, error: sError } = await _supabase
                    .from('stores')
                    .select('*')
                    .eq('store_key', sKey)
                    .single();

                if (sError || !store) {
                    alert("خطأ: كود المتجر غير صحيح أو غير مسجل!");
                    resetBtn();
                    return;
                }

                // 2. التحقق من الموظف داخل المتجر
                const { data: user, error: uError } = await _supabase
                    .from('users')
                    .select('*')
                    .eq('username', uName)
                    .eq('password', pWord)
                    .eq('store_key', sKey)
                    .single();

                if (uError || !user) {
                    alert("خطأ: اسم المستخدم أو كلمة المرور غير صحيحة لهذا المتجر");
                    resetBtn();
                } else {
                    alert("تم الدخول بنجاح! أهلاً بك في " + store.store_name);
                    // هنا نوجهه للصفحة التالية
                    // window.location.href = "dashboard.html";
                }

            } catch (err) {
                alert("فشل الاتصال بالسيرفر. تأكد من الإنترنت.");
                resetBtn();
            }
        });

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.disabled = false;
            btn.innerText = "تسجيل الدخول";
        }
    </script>
</body>
</html>
