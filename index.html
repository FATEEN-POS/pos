<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام فطين POS - دخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; transition: 0.8s;
        }
        .logo-text { font-size: 3rem; font-weight: 700; letter-spacing: 8px; animation: pulse 2s infinite; }
        
        /* Login Box */
        .login-box {
            background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 90%; max-width: 400px;
            backdrop-filter: blur(20px); text-align: center; display: none; opacity: 0; transition: 0.8s;
        }
        
        .store-header { margin-bottom: 20px; color: #00ff88; font-size: 20px; font-weight: bold; display: none; }
        
        input {
            width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            color: #fff; outline: none; margin-bottom: 20px; text-align: right;
        }
        button {
            width: 100%; padding: 15px; background: #fff; color: #000;
            border: none; border-radius: 12px; font-weight: 700; cursor: pointer;
        }
        .back-btn { background: transparent; color: #888; margin-top: 10px; font-size: 14px; text-decoration: underline; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-text">FATEEN</div>
    </div>

    <div class="login-box" id="loginUI">
        <div id="step1">
            <h2>مرحباً بك</h2>
            <p style="color: #888; font-size: 14px;">أدخل كود المتجر للبدء</p>
            <input type="text" id="storeKeyInput" placeholder="كود المتجر (مثلاً: ASW01)">
            <button id="nextBtn">التحقق من المتجر</button>
        </div>

        <div id="step2" style="display: none;">
            <div class="store-header" id="storeNameDisplay">اسم المتجر</div>
            <input type="text" id="usernameInput" placeholder="اسم المستخدم">
            <input type="password" id="passwordInput" placeholder="كلمة المرور">
            <button id="loginBtn">تسجيل الدخول</button>
            <button class="back-btn" onclick="goToStep1()">تغيير المتجر</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                const ui = document.getElementById('loginUI');
                ui.style.display = 'block';
                setTimeout(() => ui.style.opacity = '1', 50);
            }, 2500);
        };

        // التحقق من كود المتجر (الخطوة 1)
        document.getElementById('nextBtn').onclick = async function() {
            const sKey = document.getElementById('storeKeyInput').value.trim();
            if(!sKey) return alert("أدخل كود المتجر أولاً");

            const { data: store, error } = await _supabase
                .from('stores')
                .select('*')
                .eq('store_key', sKey)
                .single();

            if (store) {
                if (!store.is_active) return alert("هذا المتجر موقوف!");
                
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('storeNameDisplay').innerText = "متجر: " + store.store_name;
                document.getElementById('storeNameDisplay').style.display = 'block';
                window.currentStore = store;
            } else {
                alert("كود المتجر غير موجود!");
            }
        };

        // تسجيل الدخول (الخطوة 2)
        document.getElementById('loginBtn').onclick = async function() {
            const uName = document.getElementById('usernameInput').value.trim();
            const pWord = document.getElementById('passwordInput').value.trim();
            const sKey = window.currentStore.store_key;

            const { data, error } = await _supabase
                .from('users')
                .select('*')
                .eq('store_key', sKey)
                .eq('username', uName)
                .eq('password', pWord);

            if (data && data.length > 0) {
                const user = data[0];
                
                // تشييك التاريخ (لغير المطور)
                if(user.role !== 'developer') {
                    const expiry = new Date(window.currentStore.expiry_date);
                    if (new Date() > expiry) return alert("انتهى اشتراك المحل!");
                }

                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', user.role);
                sessionStorage.setItem('storeKey', sKey);

                if (user.role === 'developer') window.location.href = "developer.html";
                else if (user.role === 'manager') window.location.href = "manager.html";
                else window.location.href = "pos.html";
            } else {
                alert("بيانات المستخدم غير صحيحة!");
            }
        };

        function goToStep1() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }
    </script>
</body>
</html>
