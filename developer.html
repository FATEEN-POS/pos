<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen OS | Developer PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --red: #ff4d4d; --white: #ffffff; --gray: #222; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--white); padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--card); border-radius: 20px; border: 1px solid var(--gray); margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--gray); text-align: center; }
        .stat-item p { margin: 10px 0 0; font-size: 24px; font-weight: 700; color: var(--accent); }

        .search-container { display: flex; gap: 10px; margin-bottom: 20px; }
        #storeSearch { 
            flex: 1; padding: 12px; background: #1a1a1a; border: 1px solid var(--gray); border-radius: 12px; color: #fff; outline: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: left 15px center; padding-left: 45px;
        }
        .btn-add-store { padding: 12px 30px; background: var(--white); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .stores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .store-card { background: var(--card); border: 1px solid var(--gray); border-radius: 22px; padding: 20px; cursor: pointer; position: relative; }
        .store-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .expiry-badge { position: absolute; top: 15px; left: 15px; font-size: 10px; padding: 4px 10px; border-radius: 10px; font-weight: bold; }
        .active-badge { background: rgba(0, 242, 254, 0.1); color: var(--accent); }
        .expired-badge { background: rgba(255, 77, 77, 0.1); color: var(--red); }

        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; backdrop-filter:blur(10px); }
        .modal-content { background:#111; width:90%; max-width:550px; padding:30px; border-radius:25px; border: 1px solid var(--gray); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; padding: 14px; background:#1a1a1a; border:1px solid var(--gray); border-radius:12px; color: #fff; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-action { width: 100%; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; margin-top: 10px; }
        .btn-save { background: var(--accent); color: #000; }
        .btn-cancel { background: transparent; color: #888; border: 1px solid var(--gray); }
        .emp-list-item { background: #000; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <h1>لوحة تحكم فطين <span style="color:var(--accent)">PRO</span></h1>
        <div style="display:flex; gap:10px;">
            <button onclick="exportData()" style="background:none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 10px; cursor: pointer;">تصدير Excel</button>
            <button onclick="logout()" style="background:none; border: 1px solid var(--red); color: var(--red); padding: 5px 15px; border-radius: 10px; cursor: pointer;">خروج</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><h4>الأرباح</h4><p id="stat-revenue">0</p></div>
        <div class="stat-item"><h4>المتاجر</h4><p id="stat-stores">0</p></div>
        <div class="stat-item"><h4>موظفين</h4><p id="stat-emps">0</p></div>
        <div class="stat-item"><h4>مديرين</h4><p id="stat-mgrs">0</p></div>
    </div>

    <div class="search-container">
        <input type="text" id="storeSearch" placeholder="بحث باسم المتجر أو الكود..." oninput="filterStores()">
        <button class="btn-add-store" onclick="openModal('addStoreModal')">+ متجر جديد</button>
    </div>

    <div id="stores-display" class="stores-grid"></div>

    <div id="addStoreModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">إضافة متجر جديد</h2>
            <input type="text" id="new-st-key" placeholder="كود المتجر">
            <input type="text" id="new-st-name" placeholder="اسم المتجر">
            <input type="text" id="new-st-phone" placeholder="رقم هاتف المتجر">
            <input type="number" id="new-st-price" placeholder="سعر الاشتراك">
            <input type="date" id="new-st-expiry">
            <button class="btn-action btn-save" onclick="addNewStore()">حفظ البيانات</button>
            <button class="btn-action btn-cancel" onclick="closeModal('addStoreModal')">إلغاء</button>
        </div>
    </div>

    <div id="storeDetailModal" class="modal">
        <div class="modal-content">
            <h2 id="view-st-name"></h2>
            <div id="store-meta" style="margin-bottom: 20px; color: var(--accent);"></div>
            <div id="toggle-container" style="margin-bottom: 20px;"></div>
            
            <h4 style="border-top:1px solid #222; padding-top:15px">إضافة عضو للفريق:</h4>
            <input type="text" id="q-u-name" placeholder="الاسم">
            <input type="text" id="q-u-phone" placeholder="رقم الهاتف">
            <input type="password" id="q-u-pass" placeholder="كلمة المرور">
            <select id="q-u-role"><option value="employee">كاشير</option><option value="manager">مدير</option></select>
            <button class="btn-action btn-save" onclick="quickAddUser()">تأكيد الإضافة</button>
            
            <h4 style="margin-top:20px">الفريق الحالي:</h4>
            <div id="employee-list"></div>
            <button class="btn-action btn-cancel" onclick="closeModal('storeDetailModal')">إغلاق</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let activeStoreKey = null, allStores = [], allUsers = [];

        async function loadData() {
            const { data: st } = await _supabase.from('stores').select('*');
            const { data: us } = await _supabase.from('users').select('*');
            allStores = st || []; allUsers = us || [];
            renderStores(allStores);
            
            const rev = allStores.filter(s => s.is_active).reduce((a, b) => a + parseFloat(b.subscription_price || 0), 0);
            document.getElementById('stat-revenue').innerText = rev + " ج.م";
            document.getElementById('stat-stores').innerText = allStores.length;
            document.getElementById('stat-emps').innerText = allUsers.filter(u => u.role === 'employee').length;
            document.getElementById('stat-mgrs').innerText = allUsers.filter(u => u.role === 'manager').length;
        }

        function renderStores(data) {
            const grid = document.getElementById('stores-display');
            grid.innerHTML = data.map(st => `
                <div class="store-card" onclick='showStoreDetails(${JSON.stringify(st)})'>
                    <div class="expiry-badge ${st.is_active ? 'active-badge' : 'expired-badge'}">${st.is_active ? 'نشط' : 'متوقف'}</div>
                    <h3>${st.store_name}</h3>
                    <div style="font-size:13px; color:#777">📞 ${st.phone || 'لا يوجد'}</div>
                    <div style="color:var(--accent); font-weight:bold; margin-top:10px">${st.subscription_price} ج.م</div>
                </div>
            `).join('');
        }

        function filterStores() {
            const v = document.getElementById('storeSearch').value.toLowerCase();
            renderStores(allStores.filter(s => s.store_name.toLowerCase().includes(v) || s.store_key.toLowerCase().includes(v)));
        }

        async function addNewStore() {
            const key = document.getElementById('new-st-key').value.trim();
            const name = document.getElementById('new-st-name').value.trim();
            const phone = document.getElementById('new-st-phone').value.trim();
            const price = document.getElementById('new-st-price').value.trim();
            const expiry = document.getElementById('new-st-expiry').value;

            if(!key || !name || !phone || !price || !expiry) return alert("اكمل البيانات يا هندسة!");
            if(allStores.some(s => s.phone === phone)) return alert("الرقم ده موجود قبل كده!");

            const { error } = await _supabase.from('stores').insert([{ store_key: key, store_name: name, phone: phone, subscription_price: price, expiry_date: expiry, is_active: true }]);
            if(error) alert(error.message); else { closeModal('addStoreModal'); loadData(); }
        }

        async function showStoreDetails(st) {
            activeStoreKey = st.store_key;
            openModal('storeDetailModal');
            document.getElementById('view-st-name').innerText = st.store_name;
            document.getElementById('store-meta').innerText = `كود: ${st.store_key} | هاتف: ${st.phone}`;
            document.getElementById('toggle-container').innerHTML = `<button class="btn-action" style="background:${st.is_active ? 'var(--red)' : 'var(--accent)'}" onclick="toggleSt(${st.is_active})">${st.is_active ? 'إيقاف المتجر' : 'تفعيل المتجر'}</button>`;
            loadStoreUsers();
        }

        async function loadStoreUsers() {
            const { data: emps } = await _supabase.from('users').select('*').eq('store_key', activeStoreKey);
            document.getElementById('employee-list').innerHTML = emps?.filter(e => e.role !== 'developer').map(e => `
                <div class="emp-list-item">
                    <div style="display:flex; justify-content:space-between">
                        <span><b>${e.username}</b> (${e.role})</span>
                        <button onclick="delU('${e.username}')" style="color:var(--red); background:none; border:none; cursor:pointer">حذف</button>
                    </div>
                    <div style="font-size:12px; color:#555">📞 ${e.phone || '---'}</div>
                </div>
            `).join('') || 'لا يوجد موظفين';
        }

        async function quickAddUser() {
            const u = document.getElementById('q-u-name').value;
            const ph = document.getElementById('q-u-phone').value;
            const p = document.getElementById('q-u-pass').value;
            const r = document.getElementById('q-u-role').value;
            if(!u || !ph || !p) return alert("اكمل بيانات الموظف!");
            await _supabase.from('users').insert([{ username: u, phone: ph, password: p, store_key: activeStoreKey, role: r }]);
            loadStoreUsers(); loadData();
        }

        async function toggleSt(s) { await _supabase.from('stores').update({ is_active: !s }).eq('store_key', activeStoreKey); closeModal('storeDetailModal'); loadData(); }
        async function delU(n) { if(confirm("حذف؟")) { await _supabase.from('users').delete().eq('username', n); loadStoreUsers(); loadData(); } }
        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function logout() { sessionStorage.clear(); window.location.href='index.html'; }
        async function exportData() { const ws = XLSX.utils.json_to_sheet(allStores); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stores"); XLSX.writeFile(wb, "Fateen_Report.xlsx"); }

        loadData();
    </script>
</body>
</html>
