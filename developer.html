<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فطين - لوحة تحكم المطور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* تأثير الزجاج - Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            border: 1px solid rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }
        .search-bar {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .search-bar:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="text-blue-400"></i>
                    لوحة تحكم فطين (المطور)
                </h1>
                <p class="text-gray-400 mt-2">إدارة المتاجر والتحليلات لأسوان ومصر</p>
            </div>
            <button class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition">
                <i data-lucide="plus-circle" class="w-5 h-5"></i> إضافة متجر جديد
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-sm">إجمالي المبيعات</p>
                        <h3 class="text-2xl font-bold">150,450 ج.م</h3>
                    </div>
                    <i data-lucide="trending-up" class="text-green-400"></i>
                </div>
                <div class="mt-4 h-1 bg-gray-700 rounded-full overflow-hidden">
                    <div class="bg-green-400 h-full w-2/3"></div>
                </div>
            </div>
            </div>

        <div class="glass-card p-4 mb-8 flex flex-wrap gap-4 items-center justify-between">
            <div class="relative flex-1 min-w-[300px]">
                <i data-lucide="search" class="absolute right-3 top-2.5 text-gray-400 w-5 h-5"></i>
                <input type="text" id="storeSearch" placeholder="بحث باسم المتجر..." 
                       class="search-bar w-full pr-10 pl-4 py-2 rounded-lg text-white">
            </div>
            <div class="flex gap-2">
                <button onclick="filterStores('all')" class="px-4 py-2 rounded-md bg-gray-700 hover:bg-gray-600 transition">الكل</button>
                <button onclick="filterStores('active')" class="px-4 py-2 rounded-md bg-green-900/40 text-green-400 border border-green-800 hover:bg-green-800 transition">نشط</button>
                <button onclick="filterStores('expired')" class="px-4 py-2 rounded-md bg-red-900/40 text-red-400 border border-red-800 hover:bg-red-800 transition">منتهي</button>
            </div>
        </div>

        <div id="storesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="glass-card p-6 store-card" data-name="سوبر ماركت الصعايدة" data-status="active">
                <div class="flex justify-between items-center mb-4">
                    <span class="bg-green-900/50 text-green-400 text-xs px-2 py-1 rounded border border-green-800">نشط</span>
                    <i data-lucide="more-vertical" class="text-gray-400 cursor-pointer"></i>
                </div>
                <h4 class="text-xl font-semibold mb-2">سوبر ماركت الصعايدة</h4>
                <div class="space-y-2 text-sm text-gray-400">
                    <p class="flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> أسوان - طريق السادات</p>
                    <p class="flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> ينتهي في: 2024-12-30</p>
                </div>
                <button class="w-full mt-6 py-2 bg-white/10 hover:bg-white/20 rounded-lg transition">دخول للإدارة</button>
            </div>
        </div>
    </div>

    <script>
        // تفعيل الأيقونات
        lucide.createIcons();

        // منطق البحث والفلترة
        const searchInput = document.getElementById('storeSearch');
        const storeCards = document.querySelectorAll('.store-card');

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            storeCards.forEach(card => {
                const name = card.getAttribute('data-name').toLowerCase();
                card.style.display = name.includes(term) ? 'block' : 'none';
            });
        });

        function filterStores(status) {
            storeCards.forEach(card => {
                if (status === 'all') card.style.display = 'block';
                else {
                    card.style.display = card.getAttribute('data-status') === status ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
