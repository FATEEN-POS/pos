<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen OS | Developer PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --red: #ff4d4d; --white: #ffffff; --gray: #222; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--white); padding: 20px; }

        /* الهيدر وزر الخروج الأصلي */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--card); border-radius: 20px; border: 1px solid var(--gray); margin-bottom: 25px; }
        .btn-logout { background: none; border: 1px solid var(--red); color: var(--red); padding: 7px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* الـ 4 بوكسات (رجعت زي ما كانت) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--gray); text-align: center; }
        .stat-item h4 { margin: 0; color: #888; font-size: 14px; }
        .stat-item p { margin: 10px 0 0; font-size: 24px; font-weight: 700; color: var(--accent); }

        /* البحث والإضافة */
        .search-area { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; }
        #storeSearch { 
            flex: 1; padding: 14px; background: #1a1a1a; border: 1px solid var(--gray); border-radius: 12px; color: #fff; outline: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23333" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: left 15px center; padding-left: 45px;
        }
        .btn-add { padding: 14px 25px; background: var(--white); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }

        /* المتاجر */
        .stores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .store-card { background: var(--card); border: 1px solid var(--gray); border-radius: 22px; padding: 20px; cursor: pointer; position: relative; }
        .store-card:hover { border-color: var(--accent); }

        /* المودال */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(10px); }
        .modal-content { background:#111; width:90%; max-width:500px; padding:30px; border-radius:25px; border: 1px solid var(--gray); }
        input, select { width:100%; padding: 12px; background:#1a1a1a; border:1px solid var(--gray); border-radius:12px; color: #fff; margin-bottom: 15px; }
        .btn-confirm { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>لوحة تحكم فطين <span style="color:var(--accent)">PRO</span></h1>
        <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><h4>إجمالي الأرباح</h4><p id="stat-revenue">0</p></div>
        <div class="stat-item"><h4>المتاجر المسجلة</h4><p id="stat-stores">0</p></div>
        <div class="stat-item"><h4>عدد الموظفين</h4><p id="stat-emps">0</p></div>
        <div class="stat-item"><h4>عدد المديرين</h4><p id="stat-mgrs">0</p></div>
    </div>

    <div class="search-area">
        <input type="text" id="storeSearch" placeholder="بحث باسم المتجر أو الكود..." oninput="filterStores()">
        <button class="btn-add" onclick="openAddModal()">+ متجر جديد</button>
    </div>

    <div id="stores-display" class="stores-grid"></div>

    <div id="addStoreModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">إضافة متجر جديد</h2>
            <input type="text" id="new-key" placeholder="كود المتجر">
            <input type="text" id="new-name" placeholder="اسم المتجر">
            <input type="tel" id="new-phone" placeholder="رقم الهاتف">
            <input type="number" id="new-price" placeholder="سعر الاشتراك">
            <input type="date" id="new-expiry">
            <button class="btn-confirm" onclick="saveNewStore()">حفظ البيانات</button>
            <button onclick="closeAddModal()" style="width:100%; background:none; color:#555; border:none; margin-top:10px; cursor:pointer">إلغاء</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allStores = [];

        async function loadData() {
            const { data: st } = await _supabase.from('stores').select('*');
            const { data: us } = await _supabase.from('users').select('*');
            allStores = st || [];
            
            document.getElementById('stat-stores').innerText = allStores.length;
            document.getElementById('stat-revenue').innerText = allStores.filter(s=>s.is_active).reduce((a,b)=>a+parseFloat(b.subscription_price||0), 0) + " ج.م";
            document.getElementById('stat-emps').innerText = us?.filter(u=>u.role==='employee').length || 0;
            document.getElementById('stat-mgrs').innerText = us?.filter(u=>u.role==='manager').length || 0;
            
            renderStores(allStores);
        }

        function renderStores(data) {
            document.getElementById('stores-display').innerHTML = data.map(s => `
                <div class="store-card">
                    <h3>${s.store_name}</h3>
                    <p style="color:var(--accent)">${s.store_key}</p>
                    <small>📞 ${s.phone || 'N/A'}</small>
                </div>
            `).join('');
        }

        function filterStores() {
            const v = document.getElementById('storeSearch').value.toLowerCase();
            renderStores(allStores.filter(s => s.store_name.toLowerCase().includes(v)));
        }

        // إصلاح دوال المودال
        function openAddModal() { document.getElementById('addStoreModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addStoreModal').style.display = 'none'; }

        async function saveNewStore() {
            const k = document.getElementById('new-key').value.trim();
            const n = document.getElementById('new-name').value.trim();
            const p = document.getElementById('new-phone').value.trim();
            const pr = document.getElementById('new-price').value.trim();
            const ex = document.getElementById('new-expiry').value;

            if(!k || !n || !p || !pr || !ex) return alert("اكمل البيانات!");
            if(allStores.some(s=>s.phone === p)) return alert("الرقم متكرر!");

            const { error } = await _supabase.from('stores').insert([{ store_key: k, store_name: n, phone: p, subscription_price: pr, expiry_date: ex, is_active: true }]);
            
            if(error) alert(error.message);
            else { closeAddModal(); loadData(); }
        }

        function logout() { window.location.href = 'index.html'; }
        loadData();
    </script>
</body>
</html>
