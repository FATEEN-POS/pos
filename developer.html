<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen OS | Super Admin Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #ffffff; --red: #ff3b3b; --green: #00ff88; --gray: #252525; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--gray); }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .tool-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gray); text-align: center; cursor: pointer; }
        .tool-card:hover { border-color: #fff; transform: translateY(-5px); }
        
        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); overflow-y: auto; }
        .modal-content { background: var(--card); width: 95%; max-width: 600px; padding: 30px; border-radius: 25px; border: 1px solid var(--gray); position: relative; margin: 20px; }
        .close-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 20px; }

        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .btn-del { background: var(--red); color: #fff; }
        .btn-toggle { background: #333; color: #fff; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .active { background: var(--green); color: #000; }
        .expired { background: var(--red); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1>تحكم المطور المطلق 🛠️</h1>
        <button onclick="logout()" style="width:auto; background:var(--red); color:#fff">خروج</button>
    </div>

    <div class="main-grid">
        <div class="tool-card" onclick="openModal('storeModal')"><i>🏪</i><h3>المتاجر والاشتراكات</h3><p>تحكم في حالة المتجر ومدة الاشتراك</p></div>
        <div class="tool-card" onclick="openModal('userModal')"><i>👥</i><h3>إدارة الموظفين</h3><p>إضافة وحذف حسابات الدخول</p></div>
        <div class="tool-card" onclick="openModal('keyModal')"><i>🔑</i><h3>أكواد التفعيل</h3><p>توليد مفاتيح الترخيص</p></div>
    </div>

    <div id="storeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('storeModal')">✕</span>
            <h2>🏪 إدارة المتاجر والاشتراكات</h2>
            <div style="border: 1px solid #333; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
                <label>إضافة محل جديد:</label>
                <input type="text" id="st-key" placeholder="كود المحل">
                <input type="text" id="st-name" placeholder="اسم المحل">
                <input type="date" id="st-expiry" title="تاريخ انتهاء الاشتراك">
                <textarea id="st-notes" placeholder="ملاحظات الاشتراك (مثلاً: اشتراك شهرين)"></textarea>
                <button onclick="addStore()">حفظ المحل</button>
            </div>
            
            <label>تعديل/حذف محل موجود:</label>
            <select id="st-list" onchange="loadStoreDetails(this.value)"></select>
            <div id="store-actions" style="display:none;">
                <p id="current-status"></p>
                <button class="btn-toggle" onclick="toggleStoreStatus()">قفل/فتح السيستم لهذا المحل</button>
                <button class="btn-del" onclick="deleteStore()">حذف المحل نهائياً</button>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('userModal')">✕</span>
            <h2>👥 إدارة المستخدمين</h2>
            <select id="us-store-list"></select>
            <input type="text" id="us-name" placeholder="اسم المستخدم">
            <input type="password" id="us-pass" placeholder="كلمة المرور">
            <select id="us-role">
                <option value="employee">موظف</option>
                <option value="manager">مدير</option>
            </select>
            <button onclick="addUser()">إضافة حساب</button>
            <hr>
            <label>حذف مستخدم:</label>
            <select id="us-del-list"></select>
            <button class="btn-del" onclick="deleteUser()">حذف الحساب المختار</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function openModal(id) { document.getElementById(id).style.display = 'flex'; refreshAll(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { sessionStorage.clear(); window.location.href='index.html'; }

        // --- إدارة المتاجر ---
        async function addStore() {
            const { error } = await _supabase.from('stores').insert([{ 
                store_key: document.getElementById('st-key').value, 
                store_name: document.getElementById('st-name').value,
                expiry_date: document.getElementById('st-expiry').value,
                notes: document.getElementById('st-notes').value,
                is_active: true
            }]);
            if(!error) { alert("تم الحفظ بنجاح"); refreshAll(); } else alert(error.message);
        }

        async function loadStoreDetails(key) {
            if(!key) return;
            const { data } = await _supabase.from('stores').select('*').eq('store_key', key).single();
            const actions = document.getElementById('store-actions');
            actions.style.display = 'block';
            document.getElementById('current-status').innerHTML = `الحالة: ${data.is_active ? '✅ مفتوح' : '❌ مغلق'} | ينتهي في: ${data.expiry_date || 'غير محدد'}`;
            window.currentStore = data;
        }

        async function toggleStoreStatus() {
            const newStatus = !window.currentStore.is_active;
            const { error } = await _supabase.from('stores').update({ is_active: newStatus }).eq('store_key', window.currentStore.store_key);
            if(!error) { alert("تم تغيير حالة المحل"); loadStoreDetails(window.currentStore.store_key); }
        }

        async function deleteStore() {
            if(confirm("حذف المحل سيمسح كل الموظفين والبيانات التابعة له!")) {
                await _supabase.from('stores').delete().eq('store_key', document.getElementById('st-list').value);
                refreshAll();
            }
        }

        // --- إدارة المستخدمين (إصلاح الحذف) ---
        async function addUser() {
            const { error } = await _supabase.from('users').insert([{ 
                username: document.getElementById('us-name').value, 
                password: document.getElementById('us-pass').value, 
                store_key: document.getElementById('us-store-list').value, 
                role: document.getElementById('us-role').value 
            }]);
            if(!error) { alert("تمت الإضافة"); refreshAll(); }
        }

        async function deleteUser() {
            const userId = document.getElementById('us-del-list').value;
            if(!userId) return alert("اختر مستخدم أولاً");
            const { error } = await _supabase.from('users').delete().eq('id', userId);
            if(!error) { alert("تم حذف المستخدم بنجاح"); refreshAll(); } else alert(error.message);
        }

        async function refreshAll() {
            const { data: stores } = await _supabase.from('stores').select('*');
            const { data: users } = await _supabase.from('users').select('*');

            const stList = document.getElementById('st-list');
            const usStList = document.getElementById('us-store-list');
            const usDelList = document.getElementById('us-del-list');

            stList.innerHTML = '<option value="">-- اختر محل --</option>';
            usStList.innerHTML = usDelList.innerHTML = '';

            stores?.forEach(s => {
                stList.innerHTML += `<option value="${s.store_key}">${s.store_name}</option>`;
                usStList.innerHTML += `<option value="${s.store_key}">${s.store_name}</option>`;
            });

            users?.forEach(u => {
                if(u.role !== 'developer')
                usDelList.innerHTML += `<option value="${u.id}">${u.username} (${u.store_key})</option>`;
            });
        }
        refreshAll();
    </script>
</body>
</html>
