<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Developer PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --white: #ffffff; --gray: #222; --input-bg: #1a1a1a; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--white); padding: 20px; }

        /* تعديل السيرش بار عشان تشوف بوضوح */
        #storeSearch { 
            width: 100%; padding: 15px; 
            background: #222; /* لون أفتح شوية عشان يبان */
            border: 1px solid var(--accent); /* برواز لبني عشان يحدد مكانه */
            border-radius: 12px; color: #fff; outline: none; font-size: 16px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%2300f2fe" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
            background-repeat: no-repeat; background-position: left 15px center; padding-left: 50px;
        }
        #storeSearch::placeholder { color: #888; }

        /* باقي الستايل ثابت */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--card); border-radius: 20px; border: 1px solid var(--gray); margin-bottom: 25px; }
        .btn-add-store { padding: 12px 30px; background: var(--white); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; }
        .modal-content { background:#111; width:90%; max-width:550px; padding:30px; border-radius:25px; border: 1px solid var(--gray); }
        input, select { width:100%; padding: 12px; background:var(--input-bg); border:1px solid var(--gray); border-radius:12px; color: #fff; margin-bottom: 12px; }
        .emp-list-item { background: #000; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <h1>لوحة تحكم فطين <span style="color:var(--accent)">PRO</span></h1>
        <button onclick="logout()">خروج</button>
    </div>

    <div style="margin-bottom: 25px;">
        <input type="text" id="storeSearch" placeholder="ابحث هنا عن المتاجر..." oninput="filterStores()">
    </div>

    <button class="btn-add-store" onclick="document.getElementById('addStoreModal').style.display='flex'">+ متجر جديد</button>
    <div id="stores-display" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;"></div>

    <div id="storeDetailModal" class="modal">
        <div class="modal-content">
            <h2 id="view-st-name"></h2>
            <div id="store-meta" style="color: var(--accent); margin-bottom: 15px;"></div>
            
            <h4 style="margin-top:20px">إضافة عضو جديد:</h4>
            <input type="text" id="q-u-name" placeholder="اسم الموظف">
            <input type="tel" id="q-u-phone" placeholder="رقم التليفون" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            <input type="password" id="q-u-pass" placeholder="الباسورد">
            <select id="q-u-role">
                <option value="employee">كاشير</option>
                <option value="manager">مدير فرع</option>
            </select>
            <button onclick="quickAddUser()" style="width:100%; padding:15px; background:var(--accent); color:#000; border-radius:10px; font-weight:bold; cursor:pointer; border:none;">حفظ الموظف</button>
            
            <h4 style="margin-top:20px">الفريق الحالي:</h4>
            <div id="employee-list"></div>
            <button onclick="this.closest('.modal').style.display='none'" style="width:100%; margin-top:10px; background:none; color:#666; border:none; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let activeStoreKey = null, allStores = [];

        async function loadData() {
            const { data } = await _supabase.from('stores').select('*');
            allStores = data || [];
            renderStores(allStores);
        }

        function renderStores(data) {
            document.getElementById('stores-display').innerHTML = data.map(st => `
                <div style="background:#111; padding:20px; border-radius:20px; border:1px solid #222; cursor:pointer" onclick='showStoreDetails(${JSON.stringify(st)})'>
                    <h3>${st.store_name}</h3>
                    <p style="color:var(--accent)">${st.store_key}</p>
                </div>
            `).join('');
        }

        async function showStoreDetails(st) {
            activeStoreKey = st.store_key;
            document.getElementById('storeDetailModal').style.display = 'flex';
            document.getElementById('view-st-name').innerText = st.store_name;
            document.getElementById('store-meta').innerText = "كود المتجر: " + st.store_key;
            loadStoreUsers();
        }

        // دالة إضافة الموظف (المتصلحة)
        async function quickAddUser() {
            const u = document.getElementById('q-u-name').value.trim();
            const ph = document.getElementById('q-u-phone').value.trim();
            const p = document.getElementById('q-u-pass').value.trim();
            const r = document.getElementById('q-u-role').value;

            if(!u || !ph || !p) return alert("اكمل البيانات يا بطل!");

            try {
                // تأكد إن جدول users فيه عمود phone ونوعه text
                const { error } = await _supabase.from('users').insert([{ 
                    username: u, 
                    phone: ph, 
                    password: p, 
                    store_key: activeStoreKey, 
                    role: r 
                }]);

                if(error) throw error;

                alert("تمت إضافة الموظف ✅");
                // مسح الخانات بعد النجاح
                document.getElementById('q-u-name').value = '';
                document.getElementById('q-u-phone').value = '';
                document.getElementById('q-u-pass').value = '';
                loadStoreUsers();
            } catch (err) {
                alert("مشكلة في الداتابيز: " + err.message);
            }
        }

        async function loadStoreUsers() {
            const { data } = await _supabase.from('users').select('*').eq('store_key', activeStoreKey);
            document.getElementById('employee-list').innerHTML = data?.map(e => `
                <div class="emp-list-item">
                    <b>${e.username}</b> - ${e.role === 'manager' ? 'مدير' : 'كاشير'}
                    <br><small>📞 ${e.phone || 'بدون هاتف'}</small>
                </div>
            `).join('') || 'لا يوجد موظفين';
        }

        function filterStores() {
            const v = document.getElementById('storeSearch').value.toLowerCase();
            renderStores(allStores.filter(s => s.store_name.toLowerCase().includes(v) || s.store_key.toLowerCase().includes(v)));
        }

        loadData();
    </script>
</body>
</html>
