<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fateen OS | Ultra Developer Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #fff; --red: #ff3b3b; --green: #00ff88; --gray: #222; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.2s; }
        body { margin: 0; background: var(--bg); color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--gray); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-item { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--gray); text-align: center; }
        .stat-item h4 { margin: 0; color: #888; font-size: 14px; }
        .stat-item p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }
        .stores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .store-card { background: var(--card); border: 1px solid var(--gray); border-radius: 18px; padding: 20px; cursor: pointer; position: relative; }
        .store-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-left: 8px; }
        .online { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .offline { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; backdrop-filter:blur(10px); }
        .modal-content { background:var(--card); width:90%; max-width:500px; padding:30px; border-radius:25px; border: 1px solid var(--gray); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; padding:12px; background:#000; border:1px solid var(--gray); border-radius:10px; color:#fff; margin-bottom:15px; outline:none; }
        button { width:100%; padding:12px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:700; cursor:pointer; margin-bottom:10px; }
        .btn-red { background: var(--red); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--gray); color: #fff; }
        .sub-type { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { flex: 1; padding: 10px; border: 1px solid var(--gray); border-radius: 8px; cursor: pointer; text-align: center; font-size: 13px; }
        .type-btn.active { background: var(--accent); color: #000; }
        .employee-item { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>FATEEN | Dashboard 🛠️</h1>
        <button onclick="logout()" style="width:auto; padding:8px 20px;" class="btn-red">تسجيل خروج</button>
    </div>

    <div class="stats-grid">
        <div class="stat-item"><h4>إجمالي المحلات</h4><p id="stat-stores">0</p></div>
        <div class="stat-item"><h4>الموظفين</h4><p id="stat-users">0</p></div>
        <div class="stat-item"><h4>الحالة</h4><p style="color:var(--green)">متصل</p></div>
    </div>

    <button onclick="openModal('addStoreModal')">+ إضافة محل جديد</button>

    <h2 style="margin: 20px 0; border-right: 4px solid var(--green); padding-right: 15px;">مراقبة المتاجر الحية</h2>
    <div class="stores-grid" id="stores-display"></div>

    <div id="addStoreModal" class="modal">
        <div class="modal-content">
            <h2>إضافة متجر جديد</h2>
            <input type="text" id="new-st-key" placeholder="كود المتجر (ASW01)">
            <input type="text" id="new-st-name" placeholder="اسم المتجر">
            <label>نوع الاشتراك:</label>
            <div class="sub-type">
                <div class="type-btn active" id="type-forever" onclick="setSubType('forever')">للأبد</div>
                <div class="type-btn" id="type-limited" onclick="setSubType('limited')">فترة محددة</div>
            </div>
            <div id="limited-options" style="display:none;">
                <select id="sub-months">
                    <option value="1">شهر واحد</option>
                    <option value="3">3 شهور</option>
                    <option value="6">6 شهور</option>
                    <option value="12">سنة</option>
                </select>
            </div>
            <button onclick="addNewStore()">تأكيد الإضافة</button>
            <button class="btn-outline" onclick="closeModal('addStoreModal')">إلغاء</button>
        </div>
    </div>

    <div id="storeDetailModal" class="modal">
        <div class="modal-content">
            <h2 id="view-st-name">اسم المحل</h2>
            <p id="view-st-info" style="color:#888; font-size:13px;"></p>
            <hr border="0.1" style="border-color:#222">
            <h4>الموظفين التابعين:</h4>
            <div id="employee-list"></div>
            <button onclick="openAddUser()">+ إضافة موظف لهذا المحل</button>
            <button class="btn-outline" id="status-btn" onclick="toggleStatus()">قفل/فتح المحل</button>
            <button class="btn-red" onclick="deleteCurrentStore()">حذف المحل نهائياً</button>
            <button class="btn-outline" onclick="closeModal('storeDetailModal')">إغلاق</button>
        </div>
    </div>

    <div id="addUserModal" class="modal">
        <div class="modal-content">
            <h3>إضافة موظف جديد</h3>
            <input type="text" id="u-name" placeholder="اسم المستخدم">
            <input type="password" id="u-pass" placeholder="كلمة المرور">
            <select id="u-role">
                <option value="employee">موظف</option>
                <option value="manager">مدير</option>
            </select>
            <button onclick="saveUser()">حفظ الموظف</button>
            <button class="btn-outline" onclick="closeModal('addUserModal')">رجوع</button>
        </div>
    </div>

    <script>
        // --- المفاتيح الصحيحة بنسبة 100% ---
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let selectedSubType = 'forever';
        let activeStoreKey = null;

        function openModal(id) { document.getElementById(id).style.display='flex'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function logout() { sessionStorage.clear(); window.location.href='index.html'; }

        function setSubType(type) {
            selectedSubType = type;
            document.getElementById('type-forever').classList.toggle('active', type === 'forever');
            document.getElementById('type-limited').classList.toggle('active', type === 'limited');
            document.getElementById('limited-options').style.display = (type === 'limited') ? 'block' : 'none';
        }

        async function addNewStore() {
            const key = document.getElementById('new-st-key').value;
            const name = document.getElementById('new-st-name').value;
            let expiry = selectedSubType === 'forever' ? '2099-12-31' : 
                         new Date(new Date().setMonth(new Date().getMonth() + parseInt(document.getElementById('sub-months').value))).toISOString().split('T')[0];

            const { error } = await _supabase.from('stores').insert([{ store_key: key, store_name: name, expiry_date: expiry, is_active: true }]);
            if(!error) { closeModal('addStoreModal'); loadData(); } else alert(error.message);
        }

        async function loadData() {
            const { data: stores } = await _supabase.from('stores').select('*');
            const { data: users } = await _supabase.from('users').select('*');
            document.getElementById('stat-stores').innerText = stores?.length || 0;
            document.getElementById('stat-users').innerText = users?.length || 0;
            const grid = document.getElementById('stores-display');
            grid.innerHTML = '';
            stores?.forEach(st => {
                const card = document.createElement('div');
                card.className = 'store-card';
                card.innerHTML = `<div class="status-dot ${st.is_active ? 'online' : 'offline'}"></div><h3>${st.store_name}</h3><p style="font-size:12px; color:#666;">كود: ${st.store_key}</p>`;
                card.onclick = () => showStoreDetails(st);
                grid.appendChild(card);
            });
        }

        async function showStoreDetails(st) {
            activeStoreKey = st.store_key;
            openModal('storeDetailModal');
            document.getElementById('view-st-name').innerText = st.store_name;
            const { data: emps } = await _supabase.from('users').select('*').eq('store_key', st.store_key);
            const list = document.getElementById('employee-list');
            list.innerHTML = '';
            emps?.forEach(e => {
                list.innerHTML += `<div class="employee-item"><span>${e.username}</span><button onclick="delU('${e.id}')" style="width:auto;" class="btn-red">حذف</button></div>`;
            });
        }

        function openAddUser() { openModal('addUserModal'); }

        async function saveUser() {
            const { error } = await _supabase.from('users').insert([{ username: document.getElementById('u-name').value, password: document.getElementById('u-pass').value, store_key: activeStoreKey, role: document.getElementById('u-role').value }]);
            if(!error) { closeModal('addUserModal'); closeModal('storeDetailModal'); loadData(); }
        }

        async function delU(id) {
            if(confirm("حذف؟")) { await _supabase.from('users').delete().eq('id', id); closeModal('storeDetailModal'); loadData(); }
        }

        async function deleteCurrentStore() {
            if(confirm("حذف المحل نهائياً؟")) { await _supabase.from('stores').delete().eq('store_key', activeStoreKey); closeModal('storeDetailModal'); loadData(); }
        }

        async function toggleStatus() {
            const { data } = await _supabase.from('stores').select('is_active').eq('store_key', activeStoreKey).single();
            await _supabase.from('stores').update({ is_active: !data.is_active }).eq('store_key', activeStoreKey);
            closeModal('storeDetailModal'); loadData();
        }

        loadData();
    </script>
</body>
</html>
