<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Developer PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00f2fe; --red: #ff4d4d; --gray: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo'; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--gray); position: relative; }
        .v-badge { background: rgba(0, 242, 254, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .btn-toggle { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <h1 style="margin:0">لوحة المطور</h1>
            <span id="sys-v" class="v-badge">Loading...</span>
        </div>
        <button onclick="sessionStorage.clear(); location.href='index.html'" style="background:none; color:var(--red); border:1px solid var(--red); padding:8px 20px; border-radius:10px; cursor:pointer;">خروج</button>
    </div>

    <div class="grid" id="stores-list"></div>

    <script>
        const _supabase = supabase.createClient('https://xyvxowlbvuqbggkslwqr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo');

        async function loadDeveloperData() {
            // جلب الإصدار
            const { data: v } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(v) document.getElementById('sys-v').innerText = "V " + v.value;

            // جلب المتاجر
            const { data: stores } = await _supabase.from('stores').select('*');
            const list = document.getElementById('stores-list');
            list.innerHTML = '';
            stores?.forEach(st => {
                list.innerHTML += `
                <div class="card" style="border-color: ${st.is_active ? '#222' : 'var(--red)'}">
                    <h3>${st.store_name}</h3>
                    <p style="color:#666">كود: ${st.store_key}</p>
                    <button class="btn-toggle" 
                            style="background: ${st.is_active ? 'var(--red)' : 'var(--accent)'}; color: #000"
                            onclick="toggleStore('${st.store_key}', ${st.is_active})">
                        ${st.is_active ? 'إغلاق المتجر' : 'تفعيل المتجر'}
                    </button>
                </div>`;
            });
        }

        async function toggleStore(key, currentStatus) {
            await _supabase.from('stores').update({ is_active: !currentStatus }).eq('store_key', key);
            loadDeveloperData();
        }

        loadDeveloperData();
        setInterval(loadDeveloperData, 300000); // تحديث القائمة كل 5 دقائق
    </script>
</body>
</html>
