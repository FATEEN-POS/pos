<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Developer PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --red: #ff4d4d; --white: #ffffff; --gray: #222; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { margin: 0; background: var(--bg); color: var(--white); padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--card); border-radius: 20px; border: 1px solid var(--gray); margin-bottom: 25px; }
        .version-box { background: #000; border: 1px dashed var(--accent); padding: 5px 15px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .version-box input { width: 80px; background: transparent; border: 1px solid #333; color: var(--accent); text-align: center; outline: none; }
        .stores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: start; }
        .store-card { background: var(--card); border: 1px solid var(--gray); border-radius: 22px; padding: 20px; cursor: pointer; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:2000; backdrop-filter:blur(10px); }
        .modal-content { background:#111; width:90%; max-width:550px; padding:30px; border-radius:25px; border: 1px solid var(--gray); max-height: 90vh; overflow-y: auto; }
        input, select, textarea { width:100%; padding: 12px; background:#1a1a1a; border:1px solid var(--gray); border-radius:12px; color: #fff; margin-bottom: 12px; outline: none; }
        .btn-save { background: var(--accent); color: #000; padding: 10px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; width: 100%; }
        .emp-item { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; border: 1px solid #222; }
        .role-badge { font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 5px; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Fateen <span style="color:var(--accent)">PRO</span></h1>
        <div class="version-box">
            <span style="font-size:12px;">إصدار النظام:</span>
            <input type="text" id="sys-ver-input" onchange="updateVersion(this.value)">
        </div>
        <button onclick="sessionStorage.clear(); location.href='index.html'" style="color:var(--red); background:none; border:1px solid var(--red); padding:5px 15px; border-radius:10px; cursor:pointer;">خروج</button>
    </div>

    <div class="stores-grid" id="stores-list"></div>

    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <h2 id="st-title"></h2>
            <h4>فريق العمل:</h4>
            <div id="team-list"></div>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <input type="text" id="new-u" placeholder="اسم المستخدم الجديد">
            <input type="password" id="new-p" placeholder="الباسورد">
            <select id="new-r"><option value="employee">كاشير</option><option value="manager">مدير</option></select>
            <button class="btn-save" onclick="addUser()">إضافة عضو للفريق</button>
            <button onclick="document.getElementById('detailsModal').style.display='none'" style="background:none; color:#888; width:100%; margin-top:10px; border:none; cursor:pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let activeKey = null;

        async function updateVersion(v) {
            await _supabase.from('settings').update({ version: v }).eq('id', 1);
            alert("تم تحديث الفيرجن للجميع!");
        }

        async function loadData() {
            const { data: ver } = await _supabase.from('settings').select('version').eq('id', 1).single();
            if(ver) document.getElementById('sys-ver-input').value = ver.version;

            const { data: stores } = await _supabase.from('stores').select('*');
            const list = document.getElementById('stores-list');
            list.innerHTML = '';
            stores?.forEach(st => {
                list.innerHTML += `<div class="store-card" onclick="showDetails('${st.store_key}', '${st.store_name}')">
                    <h3>${st.store_name}</h3>
                    <p style="color:#666">كود: ${st.store_key}</p>
                </div>`;
            });
        }

        async function showDetails(key, name) {
            activeKey = key;
            document.getElementById('st-title').innerText = name;
            document.getElementById('detailsModal').style.display = 'flex';
            loadTeam();
        }

        async function loadTeam() {
            const { data: emps } = await _supabase.from('users').select('*').eq('store_key', activeKey);
            const list = document.getElementById('team-list');
            list.innerHTML = '';
            emps?.forEach(e => {
                if(e.role !== 'developer') {
                    const roleName = e.role === 'manager' ? 'مدير' : 'كاشير';
                    list.innerHTML += `<div class="emp-item">
                        <span>${e.username} <span class="role-badge">${roleName}</span></span>
                        <button onclick="delU('${e.username}')" style="background:none; border:none; color:var(--red); cursor:pointer;">حذف</button>
                    </div>`;
                }
            });
        }

        async function addUser() {
            const u = document.getElementById('new-u').value;
            const p = document.getElementById('new-p').value;
            const r = document.getElementById('new-r').value;
            if(!u || !p) return alert("أكمل البيانات");
            await _supabase.from('users').insert([{ username: u, password: p, role: r, store_key: activeKey }]);
            loadTeam();
        }

        async function delU(un) {
            if(confirm("حذف؟")) {
                await _supabase.from('users').delete().eq('username', un);
                loadTeam();
            }
        }

        loadData();
    </script>
</body>
</html>
