<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Inventory Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --white: #ffffff; --gray: #222; --red: #ff4d4d; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--white); margin: 0; padding: 20px; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .version-badge { background: rgba(0, 242, 254, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 8px; font-size: 12px; border: 1px solid var(--accent); font-weight: bold; }

        .main-title { font-size: 32px; font-weight: 700; color: var(--white); text-align: center; margin-bottom: 10px; }
        .store-tag { text-align: center; color: var(--accent); margin-bottom: 30px; font-size: 18px; }

        .inventory-container { background: var(--card); border-radius: 20px; border: 1px solid var(--gray); padding: 20px; }
        .controls { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-bar { flex: 1; padding: 12px; background: #000; border: 1px solid var(--gray); border-radius: 10px; color: #fff; outline: none; }
        
        .btn-add { background: var(--accent); color: #000; border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #1a1a1a; color: var(--accent); padding: 15px; text-align: right; border-bottom: 2px solid var(--gray); }
        td { padding: 15px; border-bottom: 1px solid var(--gray); }

        /* ستايل المودال (نافذة إضافة منتج) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 25px; width: 90%; max-width: 450px; border: 1px solid var(--gray); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-save { background: var(--accent); color: #000; flex: 1; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-close { background: none; border: 1px solid var(--gray); color: #fff; flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-nav">
        <button onclick="location.href='manager.html'" style="background:none; border:1px solid var(--gray); color:#888; padding:8px 20px; border-radius:10px; cursor:pointer;">← عودة</button>
        <span id="sys-v" class="version-badge">V ...</span>
    </div>

    <h1 class="main-title">لوحة المخزن</h1>
    <div id="store-name-display" class="store-tag">متجر ...</div>

    <div class="inventory-container">
        <div class="controls">
            <input type="text" id="inv-search" class="search-bar" placeholder="بحث بالاسم أو الباركود..." oninput="loadInventory()">
            <button class="btn-add" onclick="showAddModal()">+ إضافة صنف جديد</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>الباركود</th>
                    <th>اسم المنتج</th>
                    <th>الكمية</th>
                    <th>سعر البيع</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="inventory-table"></tbody>
        </table>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--accent); margin-top:0;">إضافة صنف جديد</h2>
            <input type="text" id="p-barcode" placeholder="الباركود (اختياري)">
            <input type="text" id="p-name" placeholder="اسم المنتج">
            <input type="number" id="p-stock" placeholder="الكمية الحالية">
            <input type="number" id="p-price" placeholder="سعر البيع">
            <div class="modal-btns">
                <button class="btn-save" onclick="saveProduct()">حفظ في المخزن</button>
                <button class="btn-close" onclick="closeAddModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const storeKey = sessionStorage.getItem('store_key');

        function showAddModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }

        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const barcode = document.getElementById('p-barcode').value;
            const stock = document.getElementById('p-stock').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) return alert("يرجى إكمال البيانات الأساسية");

            const { error } = await _supabase.from('products').insert([{
                product_name: name,
                barcode: barcode,
                stock: parseInt(stock),
                price: parseFloat(price),
                store_key: storeKey // ربط المنتج بالمحل
            }]);

            if(!error) {
                alert("تمت الإضافة للمخزن");
                closeAddModal();
                loadInventory();
            } else {
                alert("خطأ: " + error.message);
            }
        }

        async function loadInventory() {
            if (!storeKey) return location.href = 'index.html';

            // جلب الفيرجن واسم المتجر
            const { data: vData } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(vData) document.getElementById('sys-v').innerText = "V " + vData.value;

            const { data: store } = await _supabase.from('stores').select('store_name').eq('store_key', storeKey).single();
            if(store) document.getElementById('store-name-display').innerText = "متجر " + store.store_name;

            // جلب المنتجات المفلترة بـ store_key والبحث
            const searchTerm = document.getElementById('inv-search').value;
            let query = _supabase.from('products').select('*').eq('store_key', storeKey);
            
            if(searchTerm) {
                query = query.or(`product_name.ilike.%${searchTerm}%,barcode.ilike.%${searchTerm}%`);
            }

            const { data: products } = await query;
            
            const tableBody = document.getElementById('inventory-table');
            tableBody.innerHTML = '';

            products?.forEach(p => {
                tableBody.innerHTML += `
                    <tr>
                        <td>${p.barcode || '---'}</td>
                        <td>${p.product_name}</td>
                        <td style="color:${p.stock <= 5 ? 'var(--red)' : '#fff'}">${p.stock}</td>
                        <td>${p.price} ج.م</td>
                        <td><button onclick="deleteProduct('${p.id}')" style="background:none; border:none; color:var(--red); cursor:pointer;">حذف</button></td>
                    </tr>
                `;
            });
        }

        async function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذا الصنف؟")) {
                await _supabase.from('products').delete().eq('id', id);
                loadInventory();
            }
        }

        loadInventory();
        setInterval(loadInventory, 60000);
    </script>
</body>
</html>
