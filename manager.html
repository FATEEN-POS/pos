<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111; --accent: #00f2fe; --gray: #222; --red: #ff4d4d; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo'; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); }
        .v-badge { background: rgba(255, 255, 255, 0.05); color: #555; padding: 3px 8px; border-radius: 5px; font-size: 11px; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; background: var(--accent); color: #000; margin: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div style="display:flex; align-items:center; gap:10px;">
                <h2 style="margin:0">لوحة المدير</h2>
                <span id="sys-v" class="v-badge">...</span>
            </div>
            <p id="st-name-display" style="color:var(--accent); margin:5px 0 0;"></p>
        </div>
        <button onclick="sessionStorage.clear(); location.href='index.html'" style="background:none; color:var(--red); border:1px solid var(--red); padding:5px 15px; border-radius:8px; cursor:pointer;">خروج</button>
    </div>

    <div style="text-align:center; margin-top:50px;">
        <button class="btn" onclick="location.href='pos.html'">شاشة الكاشير</button>
        <button class="btn" onclick="location.href='inventory.html'">المخزن</button>
        <button class="btn" onclick="location.href='settings.html'">الإعدادات</button>
    </div>

    <script>
        const _supabase = supabase.createClient('https://xyvxowlbvuqbggkslwqr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo');
        const sKey = sessionStorage.getItem('store_key');

        async function checkStatus() {
            // جلب الإصدار
            const { data: v } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(v) document.getElementById('sys-v').innerText = "V " + v.value;

            // فحص حالة الحساب
            const { data: store } = await _supabase.from('stores').select('is_active, store_name').eq('store_key', sKey).single();
            if (store) {
                if(!store.is_active) {
                    alert("عذراً، المتجر موقوف حالياً.");
                    sessionStorage.clear(); window.location.href='index.html';
                }
                document.getElementById('st-name-display').innerText = store.store_name;
            }
        }

        checkStatus();
        setInterval(checkStatus, 120000); // فحص كل دقيقتين
    </script>
</body>
</html>
