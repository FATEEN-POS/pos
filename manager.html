<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Manager Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --white: #ffffff; --gray: #222; --red: #ff4d4d; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--white); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--gray); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); text-align: center; }
        .card h3 { margin: 0; color: #888; font-size: 16px; }
        .card p { font-size: 28px; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .section-title { margin: 30px 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--gray); color: #fff; }
        .team-list { background: var(--card); border-radius: 15px; border: 1px solid var(--gray); padding: 10px; }
        .team-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--gray); }
        .team-item:last-child { border-bottom: none; }
        .role-tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.05); }
        textarea { width: 100%; background: #000; border: 1px solid var(--gray); color: #fff; border-radius: 10px; padding: 15px; margin-top: 10px; outline: none; }
        
        /* بوكس الفيرجن */
        .version-badge { background: rgba(255, 255, 255, 0.05); color: #888; padding: 4px 10px; border-radius: 8px; font-size: 11px; border: 1px solid var(--gray); }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <div style="display:flex; align-items:center; gap:10px;">
                <h1 style="margin:0; font-size:24px;">لوحة مدير المتجر</h1>
                <span class="version-badge">v2.0.4</span>
            </div>
            <p id="mgr-st-name" style="color:var(--accent); margin:5px 0 0;"></p>
        </div>
        <button class="btn btn-outline" style="color:var(--red); border-color:var(--red);" onclick="logout()">خروج</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>إجمالي مبيعات اليوم</h3>
            <p id="mgr-sales">0</p>
            <button class="btn btn-outline" onclick="updateSales()">تحديث يدوي للمطور</button>
        </div>
        <div class="card">
            <h3>صافي الربح الحالي</h3>
            <p id="mgr-profit">0</p>
            <button class="btn btn-outline" onclick="updateProfit()">إرسال تقرير للمطور</button>
        </div>
        <div class="card">
            <h3>الوصول السريع</h3>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-accent" style="flex:1" onclick="location.href='inventory.html'">المخزن</button>
                <button class="btn btn-accent" style="flex:1" onclick="location.href='pos.html'">الكاشير</button>
            </div>
        </div>
    </div>

    <div class="section-title">
        <h2>أعضاء الفريق</h2>
    </div>
    <div class="team-list" id="team-list">
        </div>

    <div class="section-title">
        <h2>تواصل مع المطور</h2>
    </div>
    <div class="card" style="text-align:right;">
        <label>اقتراح أو شكوى للمطور:</label>
        <textarea id="mgr-feedback" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>
        <button class="btn btn-accent" style="margin-top:15px;" onclick="sendFeedback()">إرسال الرسالة</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const userStoreKey = sessionStorage.getItem('store_key');

        async function loadManagerData() {
            const { data: store } = await _supabase.from('stores').select('*').eq('store_key', userStoreKey).single();
            if (store) {
                document.getElementById('mgr-st-name').innerText = store.store_name;
                document.getElementById('mgr-sales').innerText = store.total_sales || 0;
                document.getElementById('mgr-profit').innerText = store.net_profit || 0;
                document.getElementById('mgr-feedback').value = store.feedback || '';
            }

            const { data: members } = await _supabase.from('users').select('*').eq('store_key', userStoreKey);
            if (members) renderTeam(members);
        }

        function renderTeam(members) {
            const teamList = document.getElementById('team-list');
            teamList.innerHTML = '';
            members.forEach(member => {
                if(member.role !== 'developer') {
                    const roleAr = member.role === 'manager' ? 'مدير' : 'كاشير';
                    teamList.innerHTML += `
                        <div class="team-item">
                            <span>${member.username} <small style="color:#666">(${roleAr})</small></span>
                            <span class="role-tag">${roleAr}</span>
                        </div>`;
                }
            });
        }

        async function updateSales() {
            const newVal = prompt("أدخل إجمالي المبيعات الجديد:");
            if (newVal) {
                await _supabase.from('stores').update({ total_sales: newVal }).eq('store_key', userStoreKey);
                alert("تم تحديث المبيعات للمطور");
                loadManagerData();
            }
        }

        async function updateProfit() {
            const newVal = prompt("أدخل صافي الربح الحالي:");
            if (newVal) {
                await _supabase.from('stores').update({ net_profit: newVal }).eq('store_key', userStoreKey);
                alert("تم إرسال تقرير الربح");
                loadManagerData();
            }
        }

        async function sendFeedback() {
            const fb = document.getElementById('mgr-feedback').value;
            const { error } = await _supabase.from('stores').update({ feedback: fb }).eq('store_key', userStoreKey);
            if (error) alert("خطأ: " + error.message);
            else alert("تم إرسال الفيدباك بنجاح للمطور");
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        loadManagerData();
    </script>
</body>
</html>
