<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Manager Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --white: #ffffff; --gray: #222; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; }
        body { background: var(--bg); color: var(--white); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--gray); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); text-align: center; }
        .card h3 { color: var(--accent); margin: 0; font-size: 28px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2>لوحة مدير الفرع: <span id="store-name" style="color:var(--accent)">جاري التحميل...</span></h2>
        <button class="btn" onclick="location.href='settings.html'">الإعدادات</button>
    </div>
    <div class="grid">
        <div class="card"><h4>مبيعات اليوم</h4><p id="today-sales">0 ج.م</p></div>
        <div class="card"><h4>عدد الفواتير</h4><p id="inv-count">0</p></div>
        <div class="card"><h4>تنبيهات النواقص</h4><p id="stock-alerts" style="color:red">0</p></div>
    </div>
    <script>
        // هنا بيتم جلب بيانات المتجر الخاص بالمدير فقط بناءً على الـ store_key المخزن في الـ Session
    </script>
</body>
</html>
