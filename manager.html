<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Manager Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --white: #ffffff; --gray: #222; --red: #ff4d4d; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: var(--white); margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 15px; border: 1px solid var(--gray); margin-bottom: 20px; }
        
        /* شارات المعلومات */
        .info-badges { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .badge-v { background: rgba(0, 242, 254, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(0, 242, 254, 0.3); font-weight: bold; }
        .badge-expiry { background: rgba(255, 77, 77, 0.1); color: var(--red); padding: 4px 12px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(255, 77, 77, 0.3); font-weight: bold; }

        .main-title { font-size: 32px; font-weight: 700; color: var(--white); text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,242,254,0.3); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); text-align: center; }
        .card h3 { margin: 0; font-size: 14px; color: #888; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: 700; color: var(--accent); }
        
        .action-btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .btn { padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; font-size: 16px; background: var(--white); color: #000; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,242,254,0.2); }
        
        .feedback-section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--gray); }
        textarea { width: 100%; height: 100px; background: #000; border: 1px solid var(--gray); border-radius: 10px; color: #fff; padding: 15px; margin-top: 10px; outline: none; }
        
        .team-list { margin-top: 20px; }
        .team-item { display: flex; justify-content: space-between; background: #000; padding: 10px 15px; border-radius: 8px; margin-bottom: 5px; border: 1px solid #222; }
    </style>
</head>
<body>

    <h1 class="main-title">بيانات المدير</h1>

    <div class="header">
        <div>
            <h2 id="store-name-display" style="margin:0; font-size:22px; color:var(--accent);">جاري التحميل...</h2>
            <div class="info-badges">
                <span id="sys-v" class="badge-v">V ...</span>
                <span id="days-left" class="badge-expiry">...</span>
            </div>
        </div>
        <button onclick="logout()" style="background:none; border: 1px solid var(--red); color: var(--red); padding: 8px 15px; border-radius: 10px; cursor: pointer;">خروج</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>إجمالي مبيعات المتجر</h3>
            <p id="total-sales">0</p>
            <button onclick="updateSales()" style="margin-top:10px; background:none; color:var(--accent); border:none; cursor:pointer; font-size:12px;">تحديث</button>
        </div>
        <div class="card">
            <h3>صافي الربح الحالي</h3>
            <p id="net-profit">0</p>
            <button onclick="updateProfit()" style="margin-top:10px; background:none; color:var(--accent); border:none; cursor:pointer; font-size:12px;">إرسال تقرير</button>
        </div>
    </div>

    <div class="action-btns">
        <button class="btn" onclick="location.href='pos.html'">شاشة البيع (POS)</button>
        <button class="btn" onclick="location.href='inventory.html'">المخزن والمنتجات</button>
        <button class="btn" onclick="location.href='settings.html'">إعدادات المتجر</button>
    </div>

    <div class="feedback-section">
        <h3>تواصل مع المطور (بلاغات / طلبات)</h3>
        <textarea id="mgr-feedback" placeholder="اكتب ملاحظاتك هنا..."></textarea>
        <button class="btn" onclick="sendFeedback()" style="margin-top:10px; width:100%; background:var(--accent);">إرسال للمطور</button>
    </div>

    <div class="team-list">
        <h3>طاقم العمل</h3>
        <div id="team-display"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const userStoreKey = sessionStorage.getItem('store_key');

        async function loadManagerData() {
            if (!userStoreKey) return location.href = 'index.html';

            // جلب نسخة النظام
            const { data: vData } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(vData) document.getElementById('sys-v').innerText = "V " + vData.value;

            // جلب بيانات المتجر
            const { data: store } = await _supabase.from('stores').select('*').eq('store_key', userStoreKey).single();
            
            if (store) {
                // فحص حالة النشاط (لو قفلت السيستم يخرج تلقائي)
                if (!store.is_active) {
                    alert("تم إيقاف صلاحية الوصول لهذا المتجر.");
                    logout();
                    return;
                }

                // عرض الاسم بصيغة: متجر [الاسم]
                document.getElementById('store-name-display').innerText = "متجر " + store.store_name;
                document.getElementById('total-sales').innerText = (store.total_sales || 0) + " ج.م";
                document.getElementById('net-profit').innerText = (store.net_profit || 0) + " ج.م";
                
                // حساب الأيام المتبقية
                const diffDays = Math.ceil((new Date(store.expiry_date) - new Date()) / (1000 * 60 * 60 * 24));
                const expiryBadge = document.getElementById('days-left');
                expiryBadge.innerText = diffDays > 0 ? `باقي ${diffDays} يوم` : "الاشتراك منتهي";
                expiryBadge.style.color = diffDays <= 5 ? "var(--red)" : "var(--accent)";
            }

            // جلب طاقم العمل
            const { data: users } = await _supabase.from('users').select('*').eq('store_key', userStoreKey);
            const teamDisplay = document.getElementById('team-display');
            teamDisplay.innerHTML = '';
            users?.forEach(member => {
                if (member.role !== 'developer') {
                    const roleAr = member.role === 'manager' ? 'مدير' : 'موظف كاشير';
                    teamDisplay.innerHTML += `<div class="team-item"><span>${member.username}</span><span style="color:var(--accent); font-size:12px;">${roleAr}</span></div>`;
                }
            });
        }

        async function updateSales() {
            const newVal = prompt("أدخل إجمالي المبيعات الجديد:");
            if (newVal) { await _supabase.from('stores').update({ total_sales: newVal }).eq('store_key', userStoreKey); loadManagerData(); }
        }

        async function updateProfit() {
            const newVal = prompt("أدخل صافي الربح الحالي:");
            if (newVal) { await _supabase.from('stores').update({ net_profit: newVal }).eq('store_key', userStoreKey); loadManagerData(); }
        }

        async function sendFeedback() {
            const fb = document.getElementById('mgr-feedback').value;
            await _supabase.from('stores').update({ feedback: fb }).eq('store_key', userStoreKey);
            alert("تم الإرسال للمطور");
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        // تحميل البيانات أول مرة
        loadManagerData();

        // التعديل 3: تحديث الصفحة تلقائياً كل دقيقة (60 ثانية)
        setInterval(loadManagerData, 60000);
    </script>
</body>
</html>
