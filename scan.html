<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>كاشير موبايل — Fateen OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080808; --surface:#111111; --surface2:#181818; --surface3:#202020;
            --accent:#00f2fe; --accent-dim:rgba(0,242,254,0.1);
            --border:#252525; --text:#f0f0f0; --text-muted:#666;
            --green:#00e676; --green-dim:rgba(0,230,118,0.1);
            --red:#ff4d4d; --red-dim:rgba(255,77,77,0.1);
            --orange:#ffa040; --orange-dim:rgba(255,160,64,0.1);
            --btn-color:#000; --input-bg:#0a0a0a;
            --radius:14px; --radius-sm:9px;
            --shadow:0 4px 24px rgba(0,0,0,0.6);
        }
        [data-theme="light"]{
            --bg:#f0ede5; --surface:#fff; --surface2:#f5f2eb; --surface3:#eae7df;
            --accent:#004643; --accent-dim:rgba(0,70,67,0.08);
            --border:#ddd8cf; --text:#1a1a1a; --text-muted:#888;
            --green:#00875a; --green-dim:rgba(0,135,90,0.08);
            --red:#c0392b; --red-dim:rgba(192,57,43,0.08);
            --orange:#d35400; --orange-dim:rgba(211,84,0,0.08);
            --btn-color:#f0ede5; --input-bg:#f5f2eb;
        }
        *,*::before,*::after{box-sizing:border-box;font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent;}
        html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);}

        /* ── CAMERA ── */
        #cam-wrap{
            position:fixed;top:0;left:0;width:100%;height:42vh;
            background:#000;z-index:5;overflow:hidden;
        }
        #cam-wrap video{width:100%;height:100%;object-fit:cover;}
        #cam-wrap canvas{display:none;}

        .scan-frame{
            position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:65%;max-width:260px;height:80px;
            border:2px solid var(--accent);border-radius:10px;
            box-shadow:0 0 0 2000px rgba(0,0,0,0.55);
            z-index:6;pointer-events:none;
        }
        .scan-line{
            position:absolute;top:0;left:0;right:0;height:2px;
            background:var(--accent);opacity:0.8;
            animation:scanAnim 1.8s ease-in-out infinite;
        }
        @keyframes scanAnim{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}

        .cam-btns{
            position:absolute;top:10px;right:10px;
            display:flex;flex-direction:column;gap:8px;z-index:10;
        }
        .cam-btn{
            width:36px;height:36px;border-radius:10px;border:none;
            background:rgba(255,255,255,0.15);backdrop-filter:blur(6px);
            color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
        }

        /* scan status */
        .scan-status{
            position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
            background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
            color:#fff;font-size:12px;font-weight:700;padding:5px 14px;border-radius:20px;
            z-index:7;white-space:nowrap;
        }
        .scan-status.found{background:rgba(0,230,118,0.85);color:#000;}
        .scan-status.error{background:rgba(255,77,77,0.85);}

        /* ── POS INTERFACE ── */
        .pos-wrap{
            position:fixed;bottom:0;left:0;width:100%;
            height:58vh;background:var(--bg);
            border-radius:20px 20px 0 0;
            display:flex;flex-direction:column;
            z-index:10;box-shadow:0 -4px 20px rgba(0,0,0,0.4);
        }

        /* header bar */
        .pos-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;
        }
        .pos-store{font-size:13px;font-weight:800;color:var(--accent);}
        .pos-user{font-size:11px;color:var(--text-muted);}
        .pos-hbtns{display:flex;gap:6px;}
        .pos-hbtn{
            width:34px;height:34px;border-radius:var(--radius-sm);
            background:var(--surface2);border:1px solid var(--border);
            color:var(--text);font-size:15px;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
        }

        /* cart */
        .cart-list{flex:1;overflow-y:auto;padding:8px 10px;}
        .cart-empty-msg{text-align:center;color:var(--text-muted);padding:20px;font-size:13px;opacity:0.6;}

        .cart-item{
            display:flex;align-items:center;gap:8px;
            background:var(--surface);border:1px solid var(--border);
            border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:6px;
        }
        .ci-info{flex:1;min-width:0;}
        .ci-name{font-weight:800;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .ci-price{font-size:11px;color:var(--text-muted);}
        .ci-qty{display:flex;align-items:center;gap:4px;}
        .ci-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
        .ci-btn:active{background:var(--accent-dim);border-color:var(--accent);}
        .ci-num{font-weight:800;font-size:13px;min-width:20px;text-align:center;}
        .ci-total{font-weight:900;font-size:13px;color:var(--accent);min-width:52px;text-align:left;}
        .ci-del{color:var(--text-muted);font-size:14px;cursor:pointer;padding:2px;}

        /* checkout */
        .checkout{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0;}
        .total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
        .total-lbl{font-size:12px;color:var(--text-muted);font-weight:700;}
        .total-val{font-size:26px;font-weight:900;color:var(--green);}

        .pay-row{display:flex;gap:6px;margin-bottom:7px;}
        .pay-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);background:var(--surface2);cursor:pointer;}
        .pay-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}

        .print-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;padding:7px 10px;background:var(--surface2);border-radius:var(--radius-sm);}
        .print-row input{width:15px;height:15px;accent-color:var(--accent);}
        .print-row label{font-size:12px;font-weight:700;cursor:pointer;}

        .btn-sell{
            width:100%;background:var(--accent);color:var(--btn-color);
            border:none;padding:13px;border-radius:var(--radius-sm);
            font-weight:900;font-size:15px;cursor:pointer;
            transition:opacity 0.2s,transform 0.15s;
        }
        .btn-sell:active{opacity:0.85;transform:scale(0.98);}

        /* ── MODALS ── */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:flex-end;padding-bottom:0;}
        .modal.open{display:flex;}
        .modal-box{
            background:var(--surface);border:1px solid var(--border);
            border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;
            padding:20px 18px;box-shadow:var(--shadow);
        }
        .modal-title{font-size:15px;font-weight:800;color:var(--accent);margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}
        .modal-close{cursor:pointer;color:var(--text-muted);font-size:18px;}
        .field-group{margin-bottom:12px;}
        .field-group label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;font-weight:600;}
        .field-input{width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);font-family:'Cairo',sans-serif;font-size:14px;outline:none;}
        .field-input:focus{border-color:var(--accent);}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;}
        .btn-accent{background:var(--accent);color:var(--btn-color);}
        .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
        .btn-red{background:var(--red);color:#fff;}
        .btn-orange{background:var(--orange);color:#000;}

        /* return items */
        .ret-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;}

        /* TOAST */
        #toast-c{position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;padding-bottom:calc(58vh + 8px);pointer-events:none;}
        .toast{padding:10px 18px;border-radius:30px;font-size:13px;font-weight:700;border:1px solid;animation:toastIn 0.3s ease;max-width:90%;text-align:center;}
        .toast-success{background:var(--green-dim);border-color:var(--green);color:var(--green);}
        .toast-error{background:var(--red-dim);border-color:var(--red);color:var(--red);}
        .toast-info{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
        @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* TARGET celebrate */
        #target-overlay{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.75);justify-content:center;align-items:center;}
        #target-overlay.show{display:flex;}
        .celebrate-box{background:var(--surface);border:2px solid var(--green);border-radius:20px;padding:28px;text-align:center;max-width:300px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
        @keyframes popIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
    </style>

    <!-- FATEEN AUTH + OFFLINE -->
    <script>
    (function(){
        const TIMEOUT_MS = 8*60*60*1000;
        const PAGE = window.location.pathname.split('/').pop()||'index.html';
        const PUBLIC = ['index.html','guide.html','about.html',''];
        function saveSession(d){localStorage.setItem('fateen_session',JSON.stringify({...d,ts:Date.now()}));}
        function getSession(){
            try{const s=JSON.parse(localStorage.getItem('fateen_session')||'null');
            if(!s)return null;
            if(Date.now()-s.ts>TIMEOUT_MS){localStorage.removeItem('fateen_session');return null;}
            return s;}catch(e){return null;}
        }
        function clearSession(){localStorage.removeItem('fateen_session');sessionStorage.clear();}
        ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,()=>{const s=getSession();if(s)saveSession(s);},{passive:true}));
        if(!PUBLIC.includes(PAGE)){
            const s=getSession();
            if(!s||!s.store_key){window.location.replace('index.html');return;}
            sessionStorage.setItem('store_key',s.store_key);
            sessionStorage.setItem('username',s.username);
            sessionStorage.setItem('userRole',s.userRole);
        }
        window._fateenAuth={saveSession,getSession,clearSession};
    })();
    </script>
</head>
<body>
<!-- OFFLINE BAR -->
<div id="offline-bar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff4d4d;color:#fff;text-align:center;padding:9px 16px;font-size:13px;font-weight:800;font-family:'Cairo',sans-serif;">
    ⚠️ لا يوجد اتصال بالإنترنت — سيتم المزامنة تلقائياً عند عودة الاتصال
</div>
<script>
(function(){
    function _updateNet(){
        const b=document.getElementById('offline-bar');
        if(b) b.style.display=navigator.onLine?'none':'block';
    }
    window.addEventListener('online',_updateNet);
    window.addEventListener('offline',_updateNet);
    document.addEventListener('DOMContentLoaded',_updateNet);
    _updateNet();
})();
</script>

<!-- CAMERA -->
<div id="cam-wrap">
    <div class="scan-frame"><div class="scan-line"></div></div>
    <div class="cam-btns">
        <button class="cam-btn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="scan-status" id="scan-status">📷 جاري تشغيل الكاميرا...</div>
</div>

<!-- POS -->
<div class="pos-wrap">
    <div class="pos-header">
        <div>
            <div class="pos-store" id="store-name-disp">المتجر</div>
            <div class="pos-user" id="user-name-disp">الموظف</div>
        </div>
        <div class="pos-hbtns">
            <button class="pos-hbtn" onclick="openReturnModal()" id="btn-return">↩️</button>
            <button class="pos-hbtn" onclick="location.href='employeesite.html'">⚙️</button>
            <button class="pos-hbtn" onclick="endShift()">🚪</button>
        </div>
    </div>

    <div class="cart-list" id="cart-list">
        <div class="cart-empty-msg">📷 امسح باركود لإضافة منتج</div>
    </div>

    <div class="checkout">
        <div class="total-row">
            <span class="total-lbl">الإجمالي</span>
            <span class="total-val" id="total-price">0.00 ج.م</span>
        </div>
        <!-- خصم -->
        <div id="discount-row" style="display:flex;align-items:center;gap:8px;margin-bottom:7px;background:var(--surface2);border-radius:var(--radius-sm);padding:6px 10px;border:1px solid var(--border);">
            <span style="font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;">🏷️ خصم</span>
            <input type="number" id="discount-val" min="0" placeholder="0" oninput="renderCart()"
                style="flex:1;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-family:'Cairo',sans-serif;font-size:13px;outline:none;">
            <select id="discount-type" onchange="renderCart()"
                style="background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-family:'Cairo',sans-serif;font-size:12px;outline:none;">
                <option value="amount">ج.م</option>
                <option value="percent">%</option>
            </select>
        </div>
        <div class="pay-row">
            <div class="pay-btn active" id="pay-cash" onclick="setPayment('كاش')">💵 كاش</div>
            <div class="pay-btn" id="pay-visa" onclick="setPayment('فيزا')">💳 فيزا</div>
        </div>
        <div class="print-row" onclick="document.getElementById('print-chk').click()">
            <input type="checkbox" id="print-chk" checked onclick="event.stopPropagation()">
            <label for="print-chk">🖨️ طباعة الفاتورة</label>
        </div>
        <button class="btn-sell" id="btn-sell" onclick="checkout()">✅ إتمام البيع</button>
    </div>
</div>

<!-- RETURN MODAL -->
<div id="returnModal" class="modal">
    <div class="modal-box">
        <div class="modal-title">
            <span>↩️ إرجاع فاتورة</span>
            <span class="modal-close" onclick="closeModal('returnModal')">✕</span>
        </div>
        <div class="field-group">
            <label>رقم الفاتورة (آخر 6 أرقام)</label>
            <div style="display:flex;gap:8px;">
                <input type="text" class="field-input" id="ret-id" placeholder="مثال: 123456" style="flex:1;">
                <button class="btn btn-accent" onclick="searchReturn()">🔍</button>
            </div>
        </div>
        <div id="ret-result"></div>
    </div>
</div>

<!-- TARGET OVERLAY -->
<div id="target-overlay">
    <div class="celebrate-box">
        <div style="font-size:54px;margin-bottom:10px;">🎉</div>
        <div style="font-size:19px;font-weight:900;color:var(--green);margin-bottom:6px;">وصلت التارجت!</div>
        <div style="font-size:26px;font-weight:900;color:var(--accent);" id="celebrate-amt">0 ج.م</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:6px;">أحسنت! 🏆</div>
        <button onclick="document.getElementById('target-overlay').classList.remove('show')"
            style="margin-top:16px;background:var(--green);color:#000;border:none;padding:10px 24px;border-radius:20px;font-family:'Cairo',sans-serif;font-weight:800;font-size:13px;cursor:pointer;">
            تمام 💪
        </button>
    </div>
</div>

<div id="toast-c"></div>

<script>
    const SUPABASE_URL='https://xyvxowlbvuqbggkslwqr.supabase.co';
    const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
    const _supabase=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

    // SECURITY
    (function(){
        const sk=sessionStorage.getItem('store_key');
        const un=sessionStorage.getItem('username');
        const role=sessionStorage.getItem('userRole');
        if(!sk||!un){location.replace('index.html');return;}
        if(role==='manager'||role==='developer'){location.replace('manager.html');return;}
    })();

    const storeKey=sessionStorage.getItem('store_key');
    const currentUser=sessionStorage.getItem('username');

    let cart=[];
    let paymentMethod='كاش';
    let allProducts=[];
    let storeSettings={};
    let storeName='';
    let employeeName='';
    let monthlyTarget=0;
    let targetReached=false;
    let scanBusy=false;

    // TOAST
    function showToast(msg,type='info'){
        const icons={success:'✅',error:'❌',info:'ℹ️'};
        const c=document.getElementById('toast-c');
        const t=document.createElement('div');
        t.className='toast toast-'+type;
        t.innerHTML=icons[type]+' '+msg;
        c.appendChild(t);
        setTimeout(()=>t.remove(),3000);
    }

    // THEME
    function toggleTheme(){
        const html=document.documentElement;
        const isLight=html.getAttribute('data-theme')==='light';
        html.setAttribute('data-theme',isLight?'':'light');
        localStorage.setItem('fateen_theme',isLight?'dark':'light');
    }
    (function(){
        if(localStorage.getItem('fateen_theme')==='light') document.documentElement.setAttribute('data-theme','light');
    })();

    // INIT
    async function init(){
        try{
            const[{data:store},{data:user}]=await Promise.all([
                _supabase.from('stores').select('*').eq('store_key',storeKey).single(),
                _supabase.from('users').select('*').eq('username',currentUser).eq('store_key',storeKey).single()
            ]);
            if(store){
                storeName=store.store_name;
                storeSettings=store;
                document.getElementById('store-name-disp').innerText=storeName;
                applyPermissions(store);
            }
            if(user){
                employeeName=user.full_name||currentUser;
                document.getElementById('user-name-disp').innerText=employeeName;
                monthlyTarget=parseFloat(user.monthly_target||0);
            }
        }catch(e){}
        await loadProducts();
        startScanner();
        updateTargetDisplay();
    }

    // PERMISSIONS
    function applyPermissions(store){
        if(store.perm_returns===false){
            const b=document.getElementById('btn-return');
            if(b) b.style.display='none';
        }
        if(store.perm_discounts===false){
            const d=document.getElementById('discount-row');
            if(d) d.style.display='none';
        }
        if(store.perm_show_stats===false){
            // مفيش target box في الموبايل — بس منع الـ overlay
            targetReached=true; // منع الـ celebration
        }
    }

    // LOAD PRODUCTS
    async function loadProducts(){
        try{
            const cacheKey='fateen_products_'+storeKey;
            const cached=sessionStorage.getItem(cacheKey);
            if(cached){allProducts=JSON.parse(cached);return;}
            const{data}=await _supabase.from('products').select('*').eq('store_key',storeKey).gt('stock',0).order('product_name');
            allProducts=data||[];
            sessionStorage.setItem(cacheKey,JSON.stringify(allProducts));
        }catch(e){showToast('خطأ في تحميل المنتجات','error');}
    }

    // SCANNER
    function startScanner(){
        setScanStatus('📷 جاري تشغيل الكاميرا...',false);
        Quagga.init({
            inputStream:{
                name:'Live',type:'LiveStream',
                target:document.getElementById('cam-wrap'),
                constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
            },
            decoder:{readers:['ean_reader','code_128_reader','ean_8_reader','code_39_reader']},
            locate:true,
            numOfWorkers:2
        },(err)=>{
            if(!err){
                Quagga.start();
                setScanStatus('🔍 جاهز للمسح',false);
            } else {
                setScanStatus('❌ لا يمكن الوصول للكاميرا',true);
                showToast('فشل تشغيل الكاميرا','error');
            }
        });
        Quagga.onDetected((res)=>{
            const code=res.codeResult.code;
            if(!scanBusy && code && code.length>=4){
                scanBusy=true;
                handleBarcode(code);
                setTimeout(()=>scanBusy=false,1800);
            }
        });
    }

    function setScanStatus(msg,isError){
        const el=document.getElementById('scan-status');
        if(!el) return;
        el.innerText=msg;
        el.className='scan-status'+(isError?' error':'');
    }

    function handleBarcode(code){
        // لو مفتوحة جوه modal في pos.html - ابعت الباركود لـ parent
        if(window.parent && window.parent !== window){
            window.parent.postMessage({type:'barcode',value:code},'*');
            setScanStatus('✅ تم إرسال الباركود',false);
            return;
        }
        // بحث بالباركود (standalone mode)
        const product=allProducts.find(p=>p.barcode&&p.barcode===code);
        if(product){
            addToCart(product);
            setScanStatus('✅ '+product.product_name,false);
            el=document.getElementById('scan-status');
            if(el) el.className='scan-status found';
            setTimeout(()=>setScanStatus('🔍 جاهز للمسح',false),1500);
            showToast('تم إضافة: '+product.product_name,'success');
        } else {
            setScanStatus('⚠️ باركود: '+code,true);
            showToast('منتج غير موجود في المخزن','error');
            setTimeout(()=>setScanStatus('🔍 جاهز للمسح',false),2000);
        }
    }

    // CART
    function addToCart(p){
        const effectivePrice=getEffectivePrice(p);
        const exist=cart.find(i=>i.id===p.id);
        if(exist){
            if(exist.qty>=p.stock){showToast('وصلت للحد الأقصى','error');return;}
            exist.qty++;
        } else {
            cart.push({...p,price:effectivePrice,originalPrice:p.price,qty:1});
        }
        renderCart();
    }

    function changeQty(idx,delta){
        cart[idx].qty+=delta;
        if(cart[idx].qty<=0) cart.splice(idx,1);
        else if(cart[idx].qty>cart[idx].stock){cart[idx].qty=cart[idx].stock;showToast('وصلت للحد الأقصى','error');}
        renderCart();
    }

    function removeItem(idx){cart.splice(idx,1);renderCart();}

    // EFFECTIVE PRICE - تطبيق الخصم التلقائي
    function getEffectivePrice(p){
        if(!p.discount_price||p.discount_price>=p.price) return p.price;
        if(p.discount_end_date){
            const today=new Date().toISOString().split('T')[0];
            if(today>p.discount_end_date){p.discount_price=null;p.discount_end_date=null;return p.price;}
        }
        return p.discount_price;
    }

    function getDiscount(subtotal){
        const val=parseFloat(document.getElementById('discount-val')?.value)||0;
        const type=document.getElementById('discount-type')?.value||'amount';
        if(!val) return 0;
        return type==='percent' ? Math.min(subtotal*(val/100),subtotal) : Math.min(val,subtotal);
    }

    function renderCart(){
        const el=document.getElementById('cart-list');
        if(!cart.length){
            el.innerHTML='<div class="cart-empty-msg">📷 امسح باركود لإضافة منتج</div>';
            document.getElementById('total-price').innerText='0.00 ج.م';
            return;
        }
        el.innerHTML=cart.map((item,idx)=>`
            <div class="cart-item">
                <div class="ci-info">
                    <div class="ci-name">${item.product_name}</div>
                    <div class="ci-price">${item.price} ج.م × ${item.qty}</div>
                </div>
                <div class="ci-qty">
                    <button class="ci-btn" onclick="changeQty(${idx},-1)">−</button>
                    <span class="ci-num">${item.qty}</span>
                    <button class="ci-btn" onclick="changeQty(${idx},1)">+</button>
                </div>
                <div class="ci-total">${(item.price*item.qty).toFixed(2)}</div>
                <span class="ci-del" onclick="removeItem(${idx})">✕</span>
            </div>`).join('');
        const subtotal=cart.reduce((s,i)=>s+(i.price*i.qty),0);
        const discount=getDiscount(subtotal);
        const total=subtotal-discount;
        const el2=document.getElementById('total-price');
        if(discount>0){
            el2.innerHTML=`<span style="font-size:14px;color:var(--red);text-decoration:line-through;">${subtotal.toFixed(2)}</span><br>${total.toFixed(2)} ج.م`;
        } else {
            el2.innerText=total.toFixed(2)+' ج.م';
        }
    }

    function setPayment(m){
        paymentMethod=m;
        document.getElementById('pay-cash').classList.toggle('active',m==='كاش');
        document.getElementById('pay-visa').classList.toggle('active',m==='فيزا');
    }

    // CHECKOUT
    let checkoutInProgress=false;
    async function checkout(){
        if(checkoutInProgress) return;
        if(!cart.length){showToast('السلة فارغة','error');return;}
        checkoutInProgress=true;
        const btn=document.getElementById('btn-sell');
        if(btn){btn.disabled=true;btn.innerText='⏳ جاري الحفظ...';}
        const subtotal=cart.reduce((s,i)=>s+(i.price*i.qty),0);
        const discount=getDiscount(subtotal);
        const total=subtotal-discount;
        try{
            const slimItems=cart.map(i=>({id:i.id,product_name:i.product_name,price:i.price,qty:i.qty}));
            const{data:saleData,error}=await _supabase.from('sales').insert([{
                store_key:storeKey,items:slimItems,total_amount:total,
                payment_method:paymentMethod,seller_name:currentUser,type:'sale'
            }]).select().single();
            if(error) throw error;
            for(let item of cart){
                const{data:p}=await _supabase.from('products').select('stock').eq('id',item.id).single();
                if(p) await _supabase.from('products').update({stock:p.stock-item.qty}).eq('id',item.id);
            }
            showToast('تم البيع بنجاح ✅','success');
            if(document.getElementById('print-chk').checked) printReceipt(saleData,cart,total,discount,subtotal);
            const cacheKey='fateen_products_'+storeKey;
            cart.forEach(item=>{
                const p=allProducts.find(x=>x.id===item.id);
                if(p) p.stock=Math.max(0,p.stock-item.qty);
            });
            allProducts=allProducts.filter(p=>p.stock>0);
            sessionStorage.setItem(cacheKey,JSON.stringify(allProducts));
            cart=[];
            // reset خصم
            const dv=document.getElementById('discount-val');
            if(dv) dv.value='';
            renderCart();
            updateTargetDisplay();
        }catch(e){showToast('خطأ: '+e.message,'error');}
        finally{
            checkoutInProgress=false;
            if(btn){btn.disabled=false;btn.innerText='✅ إتمام البيع';}
        }
    }

    // PRINT
    function printReceipt(saleData,items,total,discount,subtotal){
        const s=storeSettings;
        const paperW=s.invoice_size==='58mm'?'58mm':s.invoice_size==='A4'?'210mm':'80mm';
        const showEmployee=s.invoice_show_employee!==false;
        const showUnitPrice=s.invoice_show_unit_price!==false;
        const showTax=s.invoice_show_tax!==false;
        const welcome=s.invoice_welcome||'';
        const footer=s.invoice_footer||'شكراً لزيارتكم 🌟';
        const taxId=s.tax_id||'';
        const phone=s.phone||'';
        const address=s.address||'';
        const copies=parseInt(s.invoice_copies||1);
        const now=new Date();

        const buildReceipt=()=>`
            ${welcome?`<div style="text-align:center;font-size:11px;color:#666;font-style:italic;padding:3px 0 5px;">${welcome}</div>`:''}
            <div style="text-align:center;">
                <strong style="font-size:17px;font-weight:900;">${storeName}</strong><br>
                ${address?`<span style="font-size:10px;color:#555;">${address}</span><br>`:''}
                ${phone?`<span style="font-size:10px;">${phone}</span><br>`:''}
            </div>
            <hr style="border:none;border-top:1px dashed #999;margin:7px 0;">
            <div style="font-size:11px;display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:5px;">
                <span>التاريخ: <b>${now.toLocaleDateString('ar-EG')}</b></span>
                <span>رقم: <b>#${String(saleData.id).slice(-6)}</b></span>
                <span>الوقت: <b>${now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'})}</b></span>
                ${showEmployee?`<span>البائع: <b>${employeeName}</b></span>`:''}
                <span style="grid-column:1/-1;">الدفع: <b>${paymentMethod}</b></span>
            </div>
            <hr style="border:none;border-top:1px dashed #aaa;margin:5px 0;">
            <table style="width:100%;border-collapse:collapse;font-size:11px;">
                <thead><tr style="background:#111;color:#fff;">
                    <th style="padding:5px 3px;text-align:right;">الصنف</th>
                    <th style="padding:5px 3px;text-align:center;">ك</th>
                    ${showUnitPrice?'<th style="padding:5px 3px;text-align:center;">سعر</th>':''}
                    <th style="padding:5px 3px;text-align:center;">إجمالي</th>
                </tr></thead>
                <tbody>${items.map(i=>`<tr>
                    <td style="padding:5px 3px;text-align:right;font-weight:700;">${i.product_name}</td>
                    <td style="padding:5px 3px;text-align:center;">${i.qty}</td>
                    ${showUnitPrice?`<td style="padding:5px 3px;text-align:center;">${i.price}</td>`:''}
                    <td style="padding:5px 3px;text-align:center;font-weight:800;">${(i.price*i.qty).toFixed(0)}</td>
                </tr>`).join('')}</tbody>
            </table>
            <hr style="border:none;border-top:1px dashed #aaa;margin:5px 0;">
            ${discount>0?`
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;">
                <span>المجموع:</span><span>${(subtotal||total+discount).toFixed(0)} ج.م</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#c0392b;">
                <span>الخصم:</span><span>- ${discount.toFixed(0)} ج.م</span>
            </div>`:''}
            <div style="display:flex;border:2px solid #000;border-radius:5px;overflow:hidden;margin-top:6px;">
                <div style="flex:1;background:#111;color:#fff;padding:8px;text-align:center;font-size:13px;font-weight:800;">الإجمالي</div>
                <div style="flex:1;padding:8px;text-align:center;font-size:18px;font-weight:900;">${total.toFixed(0)} ج.م</div>
            </div>
            ${showTax&&taxId?`<div style="font-size:10px;color:#777;text-align:center;margin-top:4px;">الرقم الضريبي: ${taxId}</div>`:''}
            <div style="text-align:center;margin-top:10px;font-size:11px;color:#555;border-top:1px dashed #ccc;padding-top:6px;">${footer}</div>
            <div style="text-align:center;font-size:9px;color:#aaa;margin-top:3px;">Fateen OS</div>`;

        let allCopies='';
        for(let i=0;i<copies;i++){
            allCopies+=`<div style="page-break-after:${i<copies-1?'always':'avoid'}">${buildReceipt()}</div>`;
        }
        const html=`<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8">
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
        <style>*{box-sizing:border-box;margin:0;padding:0;}body{width:${paperW};margin:0 auto;padding:10px;color:#000;background:#fff;font-family:'Cairo',sans-serif;font-weight:700;}
        @media print{@page{margin:0;size:${paperW} auto;}body{padding:8px;}}</style></head><body>
        ${allCopies}
        </body></html>`;

        // موبايل — Blob URL يتجنب مشكلة popup blocker
        const blob=new Blob([html],{type:'text/html'});
        const blobUrl=URL.createObjectURL(blob);
        const printFrame=document.createElement('iframe');
        printFrame.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;';
        printFrame.src=blobUrl;
        document.body.appendChild(printFrame);
        printFrame.onload=function(){
            try{
                printFrame.contentWindow.focus();
                printFrame.contentWindow.print();
            }catch(e){
                // fallback — فتح tab جديد
                window.open(blobUrl,'_blank');
            }
            setTimeout(()=>{
                document.body.removeChild(printFrame);
                URL.revokeObjectURL(blobUrl);
            },3000);
        };
    }

    // RETURN
    function openReturnModal(){
        document.getElementById('ret-id').value='';
        document.getElementById('ret-result').innerHTML='';
        document.getElementById('returnModal').classList.add('open');
    }

    async function searchReturn(){
        const id=document.getElementById('ret-id').value.trim();
        if(!id){showToast('أدخل رقم الفاتورة','error');return;}
        try{
            const{data:sales}=await _supabase.from('sales').select('*').eq('store_key',storeKey).eq('type','sale');
            const sale=sales?.find(s=>String(s.id).endsWith(id)||String(s.id)===id);
            if(!sale){
                document.getElementById('ret-result').innerHTML='<p style="color:var(--red);font-size:13px;text-align:center;">لم يتم العثور على الفاتورة</p>';
                return;
            }
            const items=typeof sale.items==='string'?JSON.parse(sale.items):sale.items;
            document.getElementById('ret-result').innerHTML=`
                <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:10px;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
                        <span style="font-weight:800;">فاتورة #${String(sale.id).slice(-6)}</span>
                        <span style="font-size:11px;color:var(--text-muted);">${new Date(sale.created_at).toLocaleDateString('ar-EG')}</span>
                    </div>
                    <div style="font-size:12px;color:var(--text-muted);">الإجمالي: ${parseFloat(sale.total_amount).toLocaleString()} ج.م</div>
                </div>
                <div style="display:flex;gap:8px;margin-bottom:12px;">
                    <button class="btn btn-red" style="flex:1;justify-content:center;" onclick="processFullReturn('${sale.id}')">↩️ إرجاع كامل</button>
                    <button class="btn btn-orange" style="flex:1;justify-content:center;" onclick="showPartialReturn(${JSON.stringify(sale).replace(/"/g,'&quot;')})">📦 إرجاع منتج</button>
                </div>
                <div id="partial-ret-area"></div>`;
        }catch(e){showToast('خطأ في البحث','error');}
    }

    async function processFullReturn(saleId){
        if(!confirm('إرجاع الفاتورة كاملة؟')) return;
        try{
            const{data:sale}=await _supabase.from('sales').select('*').eq('id',saleId).single();
            const items=typeof sale.items==='string'?JSON.parse(sale.items):sale.items;
            await _supabase.from('sales').insert([{store_key:storeKey,items:sale.items,total_amount:sale.total_amount,payment_method:sale.payment_method,seller_name:currentUser,type:'return'}]);
            for(let item of items){
                const{data:p}=await _supabase.from('products').select('stock').eq('id',item.id).single();
                if(p) await _supabase.from('products').update({stock:p.stock+item.qty}).eq('id',item.id);
            }
            showToast('تم الإرجاع بنجاح','success');
            closeModal('returnModal');
        }catch(e){showToast('خطأ في الإرجاع','error');}
    }

    function showPartialReturn(sale){
        const items=typeof sale.items==='string'?JSON.parse(sale.items):sale.items;
        document.getElementById('partial-ret-area').innerHTML=
            items.map((item,idx)=>`
                <div class="ret-item">
                    <div>
                        <div style="font-weight:700;font-size:13px;">${item.product_name}</div>
                        <div style="font-size:11px;color:var(--text-muted);">الكمية: ${item.qty} | ${item.price} ج.م</div>
                    </div>
                    <button class="btn btn-red" style="padding:5px 10px;font-size:12px;" onclick="processSingleReturn('${sale.id}',${idx})">↩️</button>
                </div>`).join('');
    }

    async function processSingleReturn(saleId,idx){
        try{
            const{data:sale}=await _supabase.from('sales').select('*').eq('id',saleId).single();
            const item=sale.items[idx]||(typeof sale.items==='string'?JSON.parse(sale.items)[idx]:null);
            if(!item) return;
            await _supabase.from('sales').insert([{store_key:storeKey,items:[{...item,qty:1}],total_amount:item.price,payment_method:sale.payment_method,seller_name:currentUser,type:'return'}]);
            const{data:p}=await _supabase.from('products').select('stock').eq('id',item.id).single();
            if(p) await _supabase.from('products').update({stock:p.stock+1}).eq('id',item.id);
            showToast('تم إرجاع: '+item.product_name,'success');
            closeModal('returnModal');
        }catch(e){showToast('خطأ في الإرجاع','error');}
    }

    // TARGET
    async function updateTargetDisplay(){
        try{
            const start=new Date();start.setDate(1);start.setHours(0,0,0,0);
            const{data}=await _supabase.from('sales').select('total_amount').eq('store_key',storeKey).eq('seller_name',currentUser).eq('type','sale').gte('created_at',start.toISOString());
            const total=(data||[]).reduce((s,x)=>s+parseFloat(x.total_amount||0),0);
            if(monthlyTarget>0&&total>=monthlyTarget&&!targetReached){
                targetReached=true;
                document.getElementById('celebrate-amt').innerText=total.toLocaleString('ar-EG',{maximumFractionDigits:0})+' ج.م';
                setTimeout(()=>document.getElementById('target-overlay').classList.add('show'),600);
            }
        }catch(e){}
    }

    function endShift(){
        if(confirm('إنهاء الوردية وتسجيل الخروج؟')){
            if(window._fateenAuth)window._fateenAuth.clearSession();else sessionStorage.clear(); location.href='index.html';
        }
    }

    function closeModal(id){
        const el=document.getElementById(id);
        if(el) el.classList.remove('open');
    }

    init();
</script>
