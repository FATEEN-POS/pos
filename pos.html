<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Cairo'; margin: 0; }
        .v-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #333; }
        .nav { background: #111; padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="nav">
        <span>شاشة الكاشير</span>
        <button onclick="location.href='manager.html'" style="background:none; color:#00f2fe; border:1px solid #00f2fe; padding:5px 15px; border-radius:8px; cursor:pointer;">العودة</button>
    </div>

    <div style="padding:40px; text-align:center;">
        <h1 style="color:#222">نظام البيع جاهز...</h1>
    </div>

    <div id="sys-v" class="v-tag">V ...</div>

    <script>
        const _supabase = supabase.createClient('https://xyvxowlbvuqbggkslwqr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo');
        const sKey = sessionStorage.getItem('store_key');

        async function checkStatus() {
            const { data: v } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(v) document.getElementById('sys-v').innerText = "V " + v.value;

            const { data } = await _supabase.from('stores').select('is_active').eq('store_key', sKey).single();
            if(data && !data.is_active) {
                alert("تم إيقاف النظام لهذا المتجر.");
                sessionStorage.clear(); window.location.href='index.html';
            }
        }
        checkStatus();
        setInterval(checkStatus, 120000);
    </script>
</body>
</html>
