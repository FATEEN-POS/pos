<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | POS Cashier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #111; --accent: #00f2fe; --gray: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo'; margin: 0; display: flex; height: 100vh; }
        .products-section { flex: 2; padding: 20px; border-left: 1px solid var(--gray); }
        .cart-section { flex: 1; background: var(--card); padding: 20px; display: flex; flex-direction: column; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .item { background: var(--gray); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .item:hover { border-color: var(--accent); }
        .total-box { margin-top: auto; border-top: 2px solid var(--accent); padding-top: 20px; }
        .btn-pay { background: var(--accent); color: #000; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; border: none; }
        
        /* بوكس الفيرجن */
        .version-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #444; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 5px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="products-section">
        <input type="text" placeholder="بحث عن صنف أو باركود..." style="width:100%; padding:15px; background:#111; border:1px solid #333; color:#fff; border-radius:10px; margin-bottom:20px;">
        <div class="product-grid">
            <div class="item">صنف تجريبي</div>
            <div class="item">صنف تجريبي</div>
            <div class="item">صنف تجريبي</div>
        </div>
    </div>

    <div class="cart-section">
        <h2>الفاتورة</h2>
        <div style="flex:1; overflow-y:auto;">
            <p style="color:#666; text-align:center;">السلة فارغة</p>
        </div>
        <div class="total-box">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:24px;">
                <span>الإجمالي:</span>
                <span style="color:var(--accent)">0.00</span>
            </div>
            <button class="btn-pay">دفع وفاتورة (F12)</button>
        </div>
    </div>

    <div class="version-tag">System Version: v2.0.4</div>
</body>
</html>
