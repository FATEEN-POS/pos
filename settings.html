<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --gray: #222; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo'; padding: 40px; }
        .settings-container { max-width: 600px; margin: auto; background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--gray); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); color: #fff; border-radius: 10px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; }
        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="settings-container">
        <h2 style="text-align:center;">إعدادات المتجر</h2>
        
        <label>اسم المنشأة (يظهر في الريسيت)</label>
        <input type="text" id="set-name" placeholder="اسم المحل">

        <label>لوجو المحل (URL)</label>
        <input type="text" id="set-logo" placeholder="رابط الصورة">

        <label>مقاس الطابعة</label>
        <select id="set-printer">
            <option value="80">80mm (كبيرة)</option>
            <option value="58">58mm (صغيرة)</option>
        </select>

        <label>رسالة تذييل الفاتورة</label>
        <input type="text" id="set-footer" placeholder="شكراً لزيارتكم">

        <button class="btn-save" onclick="alert('تم الحفظ بنجاح!')">حفظ كل الإعدادات</button>
        <button onclick="history.back()" style="background:none; color:#666; width:100%; border:none; margin-top:15px; cursor:pointer;">العودة للخلف</button>
    </div>
</body>
</html>
