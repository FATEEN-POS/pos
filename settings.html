<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Settings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body{background:#000; color:#fff; font-family:'Cairo'; padding:20px;}</style>
</head>
<body>
    <h1>إعدادات المتجر</h1>
    <button onclick="location.href='manager.html'">العودة للرئيسية</button>
    <p id="sys-v" style="position:fixed; bottom:10px; left:10px; color:#222; font-size:10px;"></p>

    <script>
        const _supabase = supabase.createClient('https://xyvxowlbvuqbggkslwqr.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo');
        const sKey = sessionStorage.getItem('store_key');

        async function checkStatus() {
            const { data: v } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(v) document.getElementById('sys-v').innerText = "V " + v.value;

            const { data } = await _supabase.from('stores').select('is_active').eq('store_key', sKey).single();
            if(data && !data.is_active) { sessionStorage.clear(); window.location.href='index.html'; }
        }
        checkStatus();
        setInterval(checkStatus, 120000);
    </script>
</body>
</html>
