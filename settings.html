<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fateen OS | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #050505; --card: #111111; --accent: #00f2fe; --gray: #222; --red: #ff4d4d; }
        * { font-family: 'Cairo', sans-serif; box-sizing: border-box; transition: 0.3s; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo'; padding: 20px; }
        
        .header-settings { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto 20px auto; }
        .version-badge { background: rgba(0, 242, 254, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 8px; font-size: 12px; border: 1px solid var(--accent); font-weight: bold; }

        .settings-container { max-width: 600px; margin: auto; background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--gray); position: relative; }
        h1 { text-align: center; color: var(--accent); font-size: 28px; margin-bottom: 30px; }
        
        label { display: block; margin-bottom: 8px; color: var(--accent); font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--gray); color: #fff; border-radius: 12px; margin-bottom: 20px; outline: none; }
        input:focus { border-color: var(--accent); }

        .btn-save { background: var(--accent); color: #000; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-save:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0,242,254,0.3); }
        
        .back-btn { background: none; border: 1px solid var(--gray); color: #888; padding: 8px 20px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .back-btn:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

    <div class="header-settings">
        <button class="back-btn" onclick="location.href='manager.html'">← عودة للوحة المدير</button>
        <span id="sys-v" class="version-badge">V ...</span>
    </div>

    <div class="settings-container">
        <h1>إعدادات المتجر</h1>
        
        <label>اسم المنشأة (يظهر في الريسيت وفي السيستم)</label>
        <input type="text" id="set-name" placeholder="مثلاً: سوبر ماركت الأمانة">

        <label>لوجو المحل (رابط الصورة URL)</label>
        <input type="text" id="set-logo" placeholder="https://example.com/logo.png">

        <label>مقاس الطابعة الافتراضي</label>
        <select id="set-printer">
            <option value="80">80mm (حرارية كبيرة)</option>
            <option value="58">58mm (حرارية صغيرة)</option>
        </select>

        <label>رسالة ترحيب أسفل الريسيت</label>
        <textarea id="set-footer" style="height: 80px;" placeholder="شكراً لزيارتكم.. نرجو أن نكون عند حسن ظنكم"></textarea>

        <button class="btn-save" onclick="saveSettings()">حفظ التغييرات</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xyvxowlbvuqbggkslwqr.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5dnhvd2xidnVxYmdna3Nsd3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDY3NzksImV4cCI6MjA4NjY4Mjc3OX0.h48-mCH2jR5Edsi2zZogbTDE-HNNfhAlQpKp9oJB_Bo';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const storeKey = sessionStorage.getItem('store_key');

        async function loadSettings() {
            if (!storeKey) return location.href = 'index.html';

            // 1. جلب نسخة النظام
            const { data: vData } = await _supabase.from('system_settings').select('value').eq('key', 'sys_version').single();
            if(vData) document.getElementById('sys-v').innerText = "V " + vData.value;

            // 2. جلب بيانات المتجر الحالية
            const { data: store, error } = await _supabase
                .from('stores')
                .select('*')
                .eq('store_key', storeKey)
                .single();

            if (store) {
                // لو المتجر مقفول يخرج تلقائي (لزيادة الأمان)
                if (!store.is_active) { logout(); return; }

                document.getElementById('set-name').value = store.store_name || "";
                // ملاحظة: لو عندك خانات في الداتابيز للوجو والبرينتر والرسالة، هنربطهم هنا
                // حالياً هربط الاسم فقط، ولو ضفت أعمدة تانية في سوبابيز قولي وأنا أعدل الكود
            }
        }

        async function saveSettings() {
            const newName = document.getElementById('set-name').value;
            
            const { error } = await _supabase
                .from('stores')
                .update({ 
                    store_name: newName
                    // هنا تقدر تضيف باقي الحقول لو موجودة في جدول stores
                })
                .eq('store_key', storeKey);

            if (!error) {
                alert("تم حفظ الإعدادات بنجاح");
                loadSettings();
            } else {
                alert("خطأ أثناء الحفظ: " + error.message);
            }
        }

        function logout() { sessionStorage.clear(); location.href = 'index.html'; }

        // تحميل البيانات عند الفتح
        loadSettings();

        // تحديث أمان كل دقيقة (عشان لو المتجر اتقفل يخرج)
        setInterval(loadSettings, 60000);
    </script>
</body>
</html>
